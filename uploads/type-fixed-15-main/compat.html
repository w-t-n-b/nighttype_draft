<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml"/>

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>相性チェック｜ナイトタイプ</title>
  <link rel="stylesheet" href="./style.css"/>
  <style>
    .type-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:24px; opacity:0; animation:popIn 0.6s ease 0.35s forwards; }
    .type-btn {
      padding:0; border-radius:14px; border:1px solid var(--border);
      background:var(--surface); cursor:pointer; transition:all 0.2s;
      overflow:hidden; text-align:left; color:var(--white);
      display:flex; flex-direction:column;
    }
    .type-btn:hover { border-color:var(--purple-l); background:rgba(124,58,237,0.1); }
    .type-btn.selected { border-color:var(--purple-l); background:rgba(124,58,237,0.2); box-shadow:0 0 16px rgba(124,58,237,0.3); }
    .tb-img { width:100%; aspect-ratio:1/1; object-fit:cover; display:block; }
    .tb-img-icon { width:100%; aspect-ratio:1/1; display:flex; align-items:center; justify-content:center; font-size:2.8rem; background:var(--surface2); }
    .tb-body { padding:10px 10px 12px; }
    .tb-name { font-family:'Syne',sans-serif; font-weight:700; font-size:0.75rem; display:block; margin-bottom:3px; }
    .tb-desc { font-size:0.65rem; color:var(--muted); line-height:1.4; }

    .compat-result { border-radius:20px; background:var(--surface); border:1px solid var(--border); padding:24px 20px; display:none; }
    .compat-result.show { display:block; animation:popIn 0.5s ease forwards; }
    .compat-result::before { content:''; display:block; height:2px; margin:-24px -20px 20px; background:linear-gradient(90deg,var(--purple),var(--pink),var(--cyan)); }
    .cr-pair { display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:20px; }
    .cr-type { display:flex; flex-direction:column; align-items:center; gap:6px; }
    .cr-type img { width:72px; height:72px; border-radius:50%; object-fit:cover; border:2px solid var(--border); }
    .cr-type .icon-fb { width:72px; height:72px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:2.2rem; background:var(--surface2); border:2px solid var(--border); }
    .cr-type .name { font-family:'Syne',sans-serif; font-size:0.68rem; font-weight:700; color:var(--purple-ll); text-align:center; max-width:80px; line-height:1.3; }
    .cr-arrow { font-size:1.4rem; color:var(--pink); }
    .cr-score { text-align:center; margin-bottom:20px; }
    .cr-score .hearts { font-size:1.5rem; letter-spacing:4px; margin-bottom:6px; }
    .cr-score .label { font-family:'Syne',sans-serif; font-size:0.68rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); }
    .cr-comment { font-size:0.85rem; line-height:1.8; color:#9d99b0; padding:16px; border-radius:12px; background:var(--surface2); border-left:3px solid var(--purple); }
  </style>
  <!-- Google Analytics (GA_MEASUREMENT_IDをご自身のIDに置き換えてください) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=GA_MEASUREMENT_ID"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'GA_MEASUREMENT_ID');
  </script>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="noise"></div>
<nav class="navbar">
  <a href="index.html" class="nav-logo">NightType</a>
  <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
</nav>
<div class="drawer" id="drawer">
  <a href="index.html"><span class="icon">🏠</span>ホーム</a>
  <a href="quiz.html"><span class="icon">🌙</span>診断する</a>
  <a href="characters.html"><span class="icon">🎴</span>キャラ一覧</a>
  <a href="compat.html" class="active"><span class="icon">💜</span>相性チェック</a>
  <a href="matrix.html"><span class="icon">📊</span>相性マトリクス</a>
</div>
<div class="drawer-overlay" id="drawer-overlay"></div>

<div class="page">
  <div class="compat-page">
    <div class="page-header">
      <h1>相性チェック</h1>
      <p>2つのタイプを選んで相性を確認しよう</p>
    </div>
    <p class="selector-label">① 自分のタイプを選ぶ</p>
    <div class="type-grid" id="grid1"></div>
    <p class="selector-label" style="animation-delay:0.4s">② 相手のタイプを選ぶ</p>
    <div class="type-grid" id="grid2"></div>
    <div class="compat-result" id="compatResult">
      <div class="cr-pair">
        <div class="cr-type"><div id="crVis1"></div><span class="name" id="crName1">—</span></div>
        <div class="cr-arrow">⟷</div>
        <div class="cr-type"><div id="crVis2"></div><span class="name" id="crName2">—</span></div>
      </div>
      <div class="cr-score">
        <div class="hearts" id="crHearts">💜💜💜</div>
        <div class="label" id="crLabel">相性スコア</div>
      </div>
      <p class="cr-comment" id="crComment">—</p>
    </div>
  </div>
</div>

<script src="./types.js"></script>
<script>
const typeKeys=Object.keys(types);
let sel1=null, sel2=null;
const heartMap={
  5:{hearts:'💜💜💜💜💜',label:'最高の相性 ★★★★★'},
  4:{hearts:'💜💜💜💜🤍',label:'とても良い相性 ★★★★☆'},
  3:{hearts:'💜💜💜🤍🤍',label:'普通の相性 ★★★☆☆'},
  2:{hearts:'💜💜🤍🤍🤍',label:'少し難しい ★★☆☆☆'},
  1:{hearts:'💜🤍🤍🤍🤍',label:'刺激が強い ★☆☆☆☆'}
};

function buildGrid(gridId, which){
  const grid=document.getElementById(gridId);
  typeKeys.forEach(key=>{
    const d=types[key];
    const btn=document.createElement('button');
    btn.className='type-btn'; btn.dataset.key=key;
    btn.innerHTML=`
      ${d.image?`<img class="tb-img" src="${d.image}" alt="${d.name}" loading="lazy"/>`:
                `<div class="tb-img-icon">${d.icon}</div>`}
      <div class="tb-body">
        <span class="tb-name">${d.name}</span>
        ${d.axisCode?`<span style="font-family:'Syne',sans-serif;font-size:0.46rem;font-weight:700;letter-spacing:0.1em;padding:1px 6px;border-radius:999px;background:rgba(124,58,237,0.15);border:1px solid rgba(168,85,247,0.3);color:rgba(196,181,253,0.8);display:inline-block;margin-bottom:3px">${d.axisCode}</span>`:''}
        <span class="tb-desc">${d.description.slice(0,28)}…</span>
      </div>`;
    btn.addEventListener('click',()=>{
      grid.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      if(which===1) sel1=key; else sel2=key;
      if(sel1&&sel2) showResult();
    });
    grid.appendChild(btn);
  });
}

function visHtml(code){
  const d=types[code];
  return d.image ? `<img src="${d.image}" style="width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid rgba(124,58,237,0.4);">`
                 : `<div class="icon-fb">${d.icon}</div>`;
}

function showResult(){
  const score=getCompat(sel1,sel2);
  const d1=types[sel1], d2=types[sel2];
  const hm=heartMap[score];
  document.getElementById('crVis1').innerHTML=visHtml(sel1);
  document.getElementById('crName1').textContent=d1.name;
  document.getElementById('crVis2').innerHTML=visHtml(sel2);
  document.getElementById('crName2').textContent=d2.name;
  document.getElementById('crHearts').textContent=hm.hearts;
  document.getElementById('crLabel').textContent=hm.label;
  document.getElementById('crComment').textContent=getCompatComment(score);
  const res=document.getElementById('compatResult');
  res.classList.remove('show'); void res.offsetWidth;
  res.classList.add('show');
  res.scrollIntoView({behavior:'smooth',block:'nearest'});
}

buildGrid('grid1',1);
buildGrid('grid2',2);

// v14: nightTypeResultを優先、なければ旧スコアから判定
const savedResult=localStorage.getItem('nightTypeResult');
const savedScores=JSON.parse(localStorage.getItem('nightTypeScores'));
let myType=null;
if(savedResult && typeKeys.includes(savedResult)){
  myType=savedResult;
} else if(savedScores){
  myType=Object.keys(savedScores).reduce((a,b)=>savedScores[a]>savedScores[b]?a:b);
}
if(myType){
  const btn=document.querySelector(`#grid1 [data-key="${myType}"]`);
  if(btn) btn.click();
}
</script>
<script src="./common.js"></script>
</body>
</html>
