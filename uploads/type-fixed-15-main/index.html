<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ナイトタイプ診断</title>
  <meta property="og:title" content="ナイトタイプ診断 | NightType"/>
  <meta property="og:description" content="20の質問であなたの夜のスタイルが分かる。16タイプの中からぴったりの答えを見つけよう。"/>
  <meta property="og:type" content="website"/>
  <meta property="og:image" content="https://nighttype.jp/images/A1.png"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <link rel="stylesheet" href="./style.css"/>
  <style>
    /* ══ トップページ専用 ══ */

    /* ── 背景 ── */
    body { overflow-x: hidden; }
    #bg-canvas { position:fixed;inset:0;z-index:0;pointer-events:none; }

    /* 流れる光波 */
    .flow-layer {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 100% 60% at 20% 10%, rgba(180,20,80,0.1) 0%, transparent 55%),
        radial-gradient(ellipse 80%  55% at 80% 85%, rgba(90,20,180,0.1) 0%, transparent 55%);
      animation: flowShift 12s ease-in-out infinite alternate;
    }
    @keyframes flowShift {
      0%   { transform: scale(1)   translateY(0px);   opacity: 0.8; }
      50%  { transform: scale(1.06) translateY(-18px); opacity: 1;   }
      100% { transform: scale(0.98) translateY(10px);  opacity: 0.9; }
    }

    /* ── ナビ ── */
    .navbar {
      position:fixed;top:0;left:0;right:0;z-index:100;
      display:flex;align-items:center;justify-content:space-between;
      padding:0 20px;height:58px;
      background:rgba(10,8,16,0.7);
      backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(244,114,182,0.1);
    }
    .nav-logo {
      font-family:'Syne',sans-serif;font-weight:800;font-size:0.95rem;
      letter-spacing:0.08em;text-transform:uppercase;
      background:linear-gradient(100deg,#fb7185,#e879f9 55%,#818cf8);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      text-decoration:none;
    }

    /* ── ページ本体 ── */
    .page { position:relative;z-index:2;padding-top:58px;min-height:100vh; }

    /* ── HERO ── */
    .home-hero {
      padding: 36px 20px 0;
      text-align: center;
      display: flex; flex-direction: column; align-items: center;
    }

    /* LIVE バッジ */
    .hero-badge {
      display:inline-flex;align-items:center;gap:8px;
      padding:6px 16px;border-radius:999px;
      border:1px solid rgba(244,114,182,0.35);
      background:rgba(244,114,182,0.08);
      font-size:0.62rem;letter-spacing:0.22em;text-transform:uppercase;
      color:#fda4af;margin-bottom:22px;
      opacity:0;animation:slideUp 0.7s cubic-bezier(0.4,0,0.2,1) 0.1s forwards;
    }
    .badge-pulse {
      width:7px;height:7px;border-radius:50%;
      background:#f472b6;
      box-shadow:0 0 0 0 rgba(244,114,182,0.7);
      animation:badgePulse 1.6s ease-in-out infinite;
    }
    @keyframes badgePulse{
      0%  { box-shadow:0 0 0 0   rgba(244,114,182,0.7); transform:scale(1);   }
      50% { box-shadow:0 0 0 8px rgba(244,114,182,0);   transform:scale(1.15);}
      100%{ box-shadow:0 0 0 0   rgba(244,114,182,0);   transform:scale(1);   }
    }

    /* タイトル */
    .hero-title {
      font-family:'Syne',sans-serif;font-weight:800;
      font-size:clamp(2.3rem,9vw,3.6rem);line-height:1.08;
      letter-spacing:-0.02em;margin-bottom:16px;
      opacity:0;animation:slideUp 0.7s cubic-bezier(0.4,0,0.2,1) 0.25s forwards;
    }
    .hero-title .grad {
      background:linear-gradient(135deg,#f472b6 0%,#e879f9 40%,#818cf8 80%,#38bdf8 100%);
      background-size:200% auto;
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      animation:titleGrad 5s linear infinite;
    }
    @keyframes titleGrad{ 0%{background-position:0%} 100%{background-position:200%} }

    .hero-sub {
      font-size:0.88rem;line-height:1.85;
      color:rgba(255,255,255,0.38);
      max-width:300px;margin-bottom:32px;
      opacity:0;animation:slideUp 0.7s cubic-bezier(0.4,0,0.2,1) 0.38s forwards;
    }

    @keyframes slideUp {
      from{ opacity:0;transform:translateY(22px); }
      to{   opacity:1;transform:translateY(0);    }
    }

    /* ── キャラグリッド ── */
    .float-grid {
      display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
      width:100%;max-width:440px;margin:0 auto 0;padding:0 2px;
      opacity:0;animation:slideUp 0.8s cubic-bezier(0.4,0,0.2,1) 0.5s forwards;
    }
    .float-card {
      border-radius:18px;overflow:hidden;position:relative;
      border:1px solid rgba(244,114,182,0.1);
      background:rgba(255,255,255,0.04);
      animation:floatUp 4s ease-in-out infinite;
      cursor:pointer;text-decoration:none;display:block;
      transition:transform 0.25s cubic-bezier(0.34,1.56,0.64,1),
                 box-shadow 0.25s,border-color 0.25s;
    }
    .float-card:nth-child(2n)  { animation-delay:0.5s; }
    .float-card:nth-child(3n)  { animation-delay:1.1s; }
    .float-card:nth-child(4n)  { animation-delay:1.6s; }
    .float-card:nth-child(5n)  { animation-delay:0.8s; }
    .float-card:nth-child(7n)  { animation-delay:1.3s; }
    .float-card:nth-child(11n) { animation-delay:2.0s; }
    @keyframes floatUp {
      0%,100%{ transform:translateY(0); }
      50%    { transform:translateY(-8px); }
    }
    .float-card img { width:100%;aspect-ratio:1/1;object-fit:cover;display:block; }
    .float-card .fc-icon {
      width:100%;aspect-ratio:1/1;display:flex;
      align-items:center;justify-content:center;
      font-size:2rem;background:rgba(255,255,255,0.03);
    }
    .float-card .fc-overlay {
      position:absolute;bottom:0;left:0;right:0;
      padding:6px 6px 8px;
      background:linear-gradient(transparent,rgba(10,8,16,0.92));
    }
    .float-card .fc-name {
      font-family:'Syne',sans-serif;font-weight:700;
      font-size:0.54rem;color:#fda4af;line-height:1.3;
    }
    .float-card:hover {
      border-color:rgba(244,114,182,0.5);
      transform:translateY(-10px) scale(1.04) !important;
      box-shadow:0 14px 36px rgba(190,24,93,0.35),0 0 0 1px rgba(244,114,182,0.3);
    }

    /* ── マーキー ── */
    .marquee-wrap {
      overflow:hidden;width:100%;
      margin:24px 0 0;
      opacity:0;animation:slideUp 0.7s cubic-bezier(0.4,0,0.2,1) 0.9s forwards;
      -webkit-mask-image:linear-gradient(90deg,transparent,black 15%,black 85%,transparent);
              mask-image:linear-gradient(90deg,transparent,black 15%,black 85%,transparent);
    }
    .marquee-track {
      display:flex;gap:12px;
      animation:marquee 28s linear infinite;
      width:max-content;
    }
    .marquee-wrap:hover .marquee-track { animation-play-state:paused; }
    @keyframes marquee{ from{transform:translateX(0)} to{transform:translateX(-50%)} }
    .mq-chip {
      flex-shrink:0;display:flex;align-items:center;gap:9px;
      padding:8px 14px;border-radius:999px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(244,114,182,0.12);
      font-size:0.68rem;color:rgba(255,255,255,0.35);white-space:nowrap;
      transition:all 0.2s;cursor:pointer;text-decoration:none;
    }
    .mq-chip:hover{ border-color:rgba(244,114,182,0.4);background:rgba(244,114,182,0.06);color:#fda4af; }
    .mq-chip img { width:22px;height:22px;border-radius:50%;object-fit:cover; }
    .mq-chip span { font-family:'Syne',sans-serif;font-size:0.62rem;color:#c084fc;font-weight:700; }

    /* ── CTA セクション（視認性向上版） ── */
    .home-cta {
      padding:40px 20px 90px;
      display:flex;flex-direction:column;align-items:center;gap:20px;
      position:relative;
    }

    /* CTAカード - グラスモーフィズム背景 */
    .cta-card {
      background:rgba(20, 15, 40, 0.9);
      backdrop-filter:blur(24px);
      border:1.5px solid rgba(196, 77, 255, 0.35);
      border-radius:32px;
      padding:36px 32px;
      display:flex;flex-direction:column;align-items:center;gap:20px;
      max-width:400px;
      width:100%;
      box-shadow:
        0 0 80px rgba(196, 77, 255, 0.2),
        0 25px 60px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      position:relative;
      overflow:hidden;
    }
    .cta-card::before {
      content:'';
      position:absolute;
      top:0;left:0;right:0;
      height:3px;
      background:linear-gradient(90deg, transparent 5%, #C44DFF 30%, #FF6B9D 50%, #C44DFF 70%, transparent 95%);
    }

    /* スタット行 */
    .stat-row { display:flex;gap:14px;margin-bottom:8px; }
    .stat-pill {
      padding:12px 20px;border-radius:999px;
      background:rgba(196, 77, 255, 0.12);
      border:1px solid rgba(196, 77, 255, 0.3);
      font-size:0.75rem;color:rgba(255,255,255,0.7);
      display:flex;align-items:center;gap:8px;
      transition:all 0.3s ease;
    }
    .stat-pill:hover {
      background:rgba(196, 77, 255, 0.2);
      border-color:rgba(196, 77, 255, 0.5);
      transform:translateY(-2px);
    }
    .stat-pill b { font-family:'Syne',sans-serif;color:#e879f9;font-size:1.05rem;font-weight:700; }

    /* メインCTAボタン - 診断スタート（超目立つ版） */
    .hero-btn {
      display:block;width:100%;max-width:320px;
      padding:24px 50px;border-radius:60px;
      background:linear-gradient(135deg,#C44DFF 0%,#FF6B9D 50%,#C44DFF 100%);
      background-size:200% auto;
      color:#fff;font-family:'Syne',sans-serif;font-weight:800;
      font-size:1.25rem;letter-spacing:0.1em;text-decoration:none;text-align:center;
      text-shadow:0 2px 12px rgba(0,0,0,0.4);
      box-shadow:
        0 0 40px rgba(196, 77, 255, 0.9),
        0 0 80px rgba(255, 107, 157, 0.5),
        0 12px 50px rgba(196, 77, 255, 0.6),
        inset 0 2px 0 rgba(255,255,255,0.35);
      transition:all 0.35s ease;
      animation:btnGrad 4s linear infinite,heroBtnPulse 2s ease-in-out infinite;
      position:relative;overflow:hidden;
      z-index:1;
    }
    .hero-btn::before {
      content:'';position:absolute;inset:0;border-radius:inherit;
      background:linear-gradient(135deg,rgba(255,255,255,0.35) 0%,transparent 50%);
      pointer-events:none;
    }
    .hero-btn::after {
      content:'';position:absolute;
      top:-50%;left:-50%;width:200%;height:200%;
      background:radial-gradient(circle,rgba(255,255,255,0.2) 0%,transparent 60%);
      animation:btnShine 3s ease-in-out infinite;
      pointer-events:none;
    }
    @keyframes btnGrad{ 0%{background-position:0%} 100%{background-position:200%} }
    @keyframes heroBtnPulse{
      0%,100%{ box-shadow:0 0 40px rgba(196, 77, 255, 0.9),0 0 80px rgba(255, 107, 157, 0.5),0 12px 50px rgba(196, 77, 255, 0.6),inset 0 2px 0 rgba(255,255,255,0.35); }
      50%    { box-shadow:0 0 60px rgba(196, 77, 255, 1),0 0 100px rgba(255, 107, 157, 0.7),0 18px 60px rgba(196, 77, 255, 0.8),inset 0 2px 0 rgba(255,255,255,0.35); }
    }
    @keyframes btnShine{
      0%,100%{ transform:rotate(0deg); opacity:0.6; }
      50%{ transform:rotate(180deg); opacity:0.9; }
    }
    .hero-btn:hover {
      transform:translateY(-6px) scale(1.08);
      box-shadow:0 0 80px rgba(196, 77, 255, 1),0 0 120px rgba(255, 107, 157, 0.8),0 30px 80px rgba(196, 77, 255, 0.7);
      filter:brightness(1.2);
    }

    /* サブリンク - キャラ一覧を見る（視認性向上版） */
    .sub-link {
      font-size:0.9rem;
      color:#f0abfc;
      text-decoration:none;
      letter-spacing:0.14em;
      padding:16px 36px;
      border-radius:60px;
      border:2.5px solid rgba(196, 77, 255, 0.7);
      background:rgba(196, 77, 255, 0.12);
      transition:all 0.3s ease;
      font-weight:700;
      font-family:'Syne',sans-serif;
      box-shadow:0 0 20px rgba(196, 77, 255, 0.25);
      position:relative;
      overflow:hidden;
    }
    .sub-link::before {
      content:'';position:absolute;inset:0;
      background:linear-gradient(135deg,rgba(196, 77, 255, 0.15),transparent);
      pointer-events:none;
    }
    .sub-link:hover{
      color:#fff;
      border-color:#e879f9;
      background:rgba(196, 77, 255, 0.3);
      box-shadow:0 0 40px rgba(196, 77, 255, 0.6),0 0 60px rgba(255, 107, 157, 0.35);
      transform:translateY(-3px) scale(1.03);
    }

    /* ── 流れるハート ── */
    #heartCanvas {
      position:fixed;inset:0;z-index:1;pointer-events:none;
    }
  </style>
  <script async src="https://www.googletagmanager.com/gtag/js?id=GA_MEASUREMENT_ID"></script>

<body>
<canvas id="bg-canvas"></canvas>
<canvas id="heartCanvas"></canvas>
<div class="flow-layer"></div>
<div class="noise"></div>

<nav class="navbar">
  <a href="index.html" class="nav-logo">NightType</a>
  <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
</nav>
<div class="drawer" id="drawer">
  <a href="index.html" class="active"><span class="icon">🏠</span>ホーム</a>
  <a href="quiz.html"><span class="icon">🌙</span>診断する</a>
  <a href="characters.html"><span class="icon">🎴</span>キャラ一覧</a>
  <a href="compat.html"><span class="icon">💜</span>相性チェック</a>
  <a href="matrix.html"><span class="icon">📊</span>相性マトリクス</a>
</div>
<div class="drawer-overlay" id="drawer-overlay"></div>

<div class="page">
  <!-- HERO -->
  <div class="home-hero">
    <div class="hero-badge">
      <div class="badge-pulse"></div>
      16 Types · Night Values
    </div>
    <h1 class="hero-title">
      あなたの<br><span class="grad">夜の価値観</span><br>タイプは？
    </h1>
    <p class="hero-sub">20の質問で、あなたの夜のスタイルが分かる。<br><span style="font-size:0.75rem;color:rgba(255,255,255,0.25)">N/S · S/M · A/Y · Give/Take</span></p>

    <!-- キャラグリッド -->
    <div class="float-grid" id="floatGrid"></div>
  </div>

  <!-- マーキー -->
  <div class="marquee-wrap" id="marqueeWrap"></div>

  <!-- CTA -->
  <div class="home-cta">
    <div class="cta-card">
      <div class="stat-row">
        <div class="stat-pill"><b>20</b>問</div>
        <div class="stat-pill"><b>16</b>タイプ</div>
        <div class="stat-pill"><b>∞</b>相性</div>
      </div>
      <a href="quiz.html" class="hero-btn">診断スタート →</a>
      <a href="characters.html" class="sub-link">キャラ一覧を見る ↓</a>
    </div>
  </div>
</div>

<script src="./types.js"></script>
<script src="./common.js"></script>
<script>
/* ── キャラグリッド ── */
const keys = Object.keys(types);
const grid = document.getElementById('floatGrid');
keys.forEach(k => {
  const d = types[k];
  const a = document.createElement('a');
  a.className = 'float-card';
  a.href = 'characters.html#' + k;
  a.innerHTML = d.image
    ? `<img src="${d.image}" alt="${d.name}" loading="lazy"/>
       <div class="fc-overlay"><div class="fc-name">${d.name}</div></div>`
    : `<div class="fc-icon">${d.icon}</div>
       <div class="fc-overlay"><div class="fc-name">${d.name}</div></div>`;
  grid.appendChild(a);
});

/* ── マーキー ── */
const wrap  = document.getElementById('marqueeWrap');
const track = document.createElement('div');
track.className = 'marquee-track';
[...keys,...keys].forEach(k => {
  const d = types[k];
  const chip = document.createElement('a');
  chip.className = 'mq-chip';
  chip.href = 'characters.html#' + k;
  chip.innerHTML = d.image
    ? `<img src="${d.image}" alt=""><span>${d.name}</span>`
    : `<span style="font-size:1rem">${d.icon}</span><span>${d.name}</span>`;
  track.appendChild(chip);
});
wrap.appendChild(track);

/* ── 流れるハート＆パーティクル ── */
(function(){
  const c  = document.getElementById('heartCanvas');
  const cx = c.getContext('2d');
  let W, H;
  function resize(){ W=c.width=innerWidth; H=c.height=innerHeight; }
  resize(); addEventListener('resize', resize);

  // パーティクル（星＋小円）
  const HEARTS = ['♡','·','✦','✧','·','♡'];
  let pts = [];

  function spawn(){
    const x = Math.random() * W;
    pts.push({
      x, y: H + 20,
      vx: (Math.random()-0.5)*0.6,
      vy: -(0.55 + Math.random()*0.9),
      size: 8 + Math.random()*14,
      alpha: 0,
      life: 0, maxLife: 180 + Math.random()*120,
      ch: HEARTS[Math.floor(Math.random()*HEARTS.length)],
      hue: Math.random()<0.5 ? 330+Math.random()*30 : 260+Math.random()*40,
    });
  }

  let frame=0;
  function draw(){
    cx.clearRect(0,0,W,H);
    frame++;
    if(frame%55===0) spawn();  // スポーン間隔

    pts = pts.filter(p=>p.life<p.maxLife);
    pts.forEach(p=>{
      p.x += p.vx;
      p.y += p.vy;
      p.life++;
      // フェードイン/アウト
      const t = p.life/p.maxLife;
      p.alpha = t < 0.15 ? t/0.15 : t > 0.75 ? (1-t)/0.25 : 1;
      cx.globalAlpha = p.alpha * 0.35;
      cx.font = `${p.size}px serif`;
      cx.fillStyle = `hsl(${p.hue},85%,75%)`;
      cx.fillText(p.ch, p.x, p.y);
    });
    cx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
</body>
