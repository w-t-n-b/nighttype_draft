<script src="quiz-vertical.js"></script>
<script>
  // URLパラメータ処理
  const params = new URLSearchParams(location.search);
  const restart = params.get('restart') === '1';
  let page = parseInt(params.get('p') || '0', 10);

  if(restart){
    localStorage.removeItem('nightTypeAnswers');
    localStorage.removeItem('nightTypeResult');
    localStorage.removeItem('nightTypeScores');
    // Q1〜はTOPなのでリスタートはTOPへ
    location.replace('index.html');
  }

  // p=1/2/3/4 のみ有効。それ以外はTOPへ
  if(![1,2,3,4].includes(page)){
    location.replace('index.html');
  }

  const root = document.getElementById('qvRoot');
  window.QuizVertical.renderPage(root, page);

  // page=1 で最初の5問すべて回答後、「次へ」ボタン押下で quiz_started を発火 (1セッション内1回)
  if(page === 1){
    (function(){
      if(sessionStorage.getItem('quiz_started_fired')) return;
      function handler(e){
        const next = e.target && e.target.closest && e.target.closest('#qvNext');
        if(!next) return;
        if(sessionStorage.getItem('quiz_started_fired')) return;
        const answers = (window.QuizVertical && window.QuizVertical.loadAnswers)
                        ? window.QuizVertical.loadAnswers() : {};
        const allAnswered = [1,2,3,4,5].every(id => answers[id] != null);
        if(!allAnswered) return;
        sessionStorage.setItem('quiz_started_fired', '1');
        if(typeof gtag === 'function'){
          try{ gtag('event', 'quiz_started'); }catch(_){}
        }
        document.removeEventListener('click', handler, true);
      }
      document.addEventListener('click', handler, true);
    })();
  }

  // ── p=4 で「次へ」を押した時はプロフィール表示を要求するため、
  //    QuizVertical のショープロフィール関数をオーバーライドしてここで処理 ──
  const povl = document.getElementById('povl');
  const profileForm = document.getElementById('profileForm');
  const reveal = document.getElementById('reveal');
  const revealBar = document.getElementById('revealBar');

  // プロフィール入力
  let interest = null;
  let ageRange = null;
  function validateAndToggle(){
    document.getElementById('pSubmit').disabled = !(interest && ageRange);
  }
  function bindGroup(wrapId, onPick){
    const wrap = document.getElementById(wrapId);
    wrap.querySelectorAll('.pgbtn').forEach(b => {
      b.addEventListener('click', () => {
        wrap.querySelectorAll('.pgbtn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        onPick(b);
        validateAndToggle();
      });
    });
  }
  bindGroup('pInterest', b => { interest = b.dataset.i; });
  bindGroup('pAge', b => { ageRange = b.dataset.a; });

  // p=4の場合のみ profile form 表示が必要
  // QuizVertical の showProfileSection が #profileSection を探すので、
  // 代わりに povl を発火させる仕組みにする
  if(page === 4){
    // p=4 で「次へ」押下時、回答完了なら povl を出す (QuizVertical の遷移を奪う)
    document.addEventListener('click', e => {
      const next = (e.target.id === 'qvNext') ? e.target : e.target.closest && e.target.closest('#qvNext');
      if(!next) return;
      const answers = window.QuizVertical.loadAnswers();
      const allAnswered = questions.every(q => answers[q.id] != null);
      if(allAnswered){
        e.preventDefault();
        e.stopImmediatePropagation();  // ★ QuizVertical本体の click ハンドラを止める
        povl.classList.add('show');
        document.body.style.overflow = 'hidden';
      }
      // 未回答時は QV のwarning表示を生かすため stop しない
    }, true);  // capture phase
  }

  // プロフィール送信
  profileForm.addEventListener('submit', e => {
    e.preventDefault();
    const errEl = document.getElementById('pErr');
    if(!interest){ errEl.textContent = '恋愛対象を選んでください'; return; }
    if(!ageRange){ errEl.textContent = '年齢層を選んでください'; return; }
    errEl.textContent = '';

    const answers = window.QuizVertical.loadAnswers();

    // スコア計算
    const W1_SCORE = {3:4, 2:3, 1:2, '-1':-2, '-2':-3, '-3':-4};
    const axisScores = { numa:0, sm:0, ai:0, gt:0 };
    const tieBreakers = { numa:null, sm:null, ai:null, gt:null };
    questions.forEach(q => {
      const v = answers[q.id];
      if(v == null) return;
      const sc = q.weight === 2 ? v * 2 : (W1_SCORE[v] || 0);
      axisScores[q.axis] += sc;
      if(q.weight === 2) tieBreakers[q.axis] = v > 0 ? 1 : -1;
    });
    const judge = ax => {
      const s = axisScores[ax];
      if(s > 0) return 'A';
      if(s < 0) return 'B';
      const tb = tieBreakers[ax];
      return tb !== null ? (tb > 0 ? 'A' : 'B') : 'B';
    };
    const numaStr = judge('numa') === 'A' ? 'numa' : 'shio';
    const smStr   = judge('sm')   === 'A' ? 'S'    : 'M';
    const aiStr   = judge('ai')   === 'A' ? 'ai'   : 'yoku';
    const gtStr   = judge('gt')   === 'A' ? 'G'    : 'T';
    const code = (typeof TYPE_MAP !== 'undefined' ? TYPE_MAP : {})[`${numaStr}_${smStr}_${aiStr}_${gtStr}`] || 'A1';

    localStorage.setItem('nightTypeResult', code);
    localStorage.setItem('nightTypeScores', JSON.stringify(axisScores));

    const profile = { ageRange, romanticInterest:interest, type:code, ts:Date.now() };
    localStorage.setItem('nightTypeProfile', JSON.stringify(profile));

    // GA4
    if(typeof gtag === 'function'){
      try{
        gtag('event', 'quiz_completed', {type:code});
        gtag('event', 'profile_collected', {age_range:ageRange, romantic_interest:interest, type:code});
      }catch(_){}
    }

    // Webhook 1: 既存 (型 + 回答)
    try{
      const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbyeIleNj5CyhZgxDpuEKyOUZgRsm3xgBhQLCiAoDPb5X-89q2BmilytJCI1Jn59kpxphg/exec';
      const ansArr = Object.entries(answers).map(([id, val]) => {
        const q = questions.find(q => q.id === +id);
        return { id:+id, axis:q?.axis, val, weight:q?.weight };
      });
      fetch(WEBHOOK_URL, {
        method:'POST', mode:'no-cors', keepalive:true,
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body: JSON.stringify({ type:code, answers:ansArr, ua:navigator.userAgent })
      }).catch(e=>console.error('[Webhook] failed', e));
    }catch(_){}

    // Webhook 2: 新 (プロフィール含む)
    try{
      const NEW_WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbxCNp-A90KK2FeDsuawwKXgcXJLeOnTCkJ9COWqG1atrjOSxqiAqfd7Cv4qNaQGWFGpHA/exec';
      const ansArr = Object.entries(answers).map(([id, val]) => {
        const q = questions.find(q => q.id === +id);
        return { id:+id, axis:q?.axis, val, weight:q?.weight };
      });
      fetch(NEW_WEBHOOK_URL, {
        method:'POST', mode:'no-cors', keepalive:true,
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body: JSON.stringify({ type:code, age_range:ageRange, romantic_interest:interest, answers:ansArr, ua:navigator.userAgent })
      }).catch(e=>console.error('[NewWebhook] failed', e));
    }catch(_){}

    // Reveal animation → result.html
    povl.classList.remove('show');
    reveal.classList.add('show');
    let p = 0;
    const iv = setInterval(() => {
      p = Math.min(p + 2, 100);
      revealBar.style.width = p + '%';
      if(p >= 100){
        clearInterval(iv);
        setTimeout(() => {
          // 訪問者モード保持: ?from=X があれば結果ページにも持って行く
          const from = params.get('from');
          location.href = 'result.html' + (from ? '?from=' + from : '');
        }, 400);
      }
    }, 20);
  });
</script>
