<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quiz — 夜キャラ診断</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="nighttype-shell.css" />
<style>
  body{ overflow:hidden; }

  .quiz-wrap{
    position:fixed; inset:0; z-index:5;
    display:flex; flex-direction:column;
    padding:80px 24px 24px;
    max-width:560px; margin:0 auto;
  }

  /* ── Top meter ── */
  .meter-row{
    display:flex; justify-content:space-between; align-items:flex-end;
    margin-bottom:14px;
  }
  .meter-label{
    font-family:"Space Mono",monospace; font-size:10px; letter-spacing:.34em;
    text-transform:uppercase; color:var(--ink-mute);
    display:flex; align-items:center; gap:8px;
  }
  .meter-label .dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--cyan);box-shadow:0 0 8px var(--cyan);
    animation:pulse 2s ease-in-out infinite;
  }
  .meter-count{
    font-family:"Cormorant Garamond",serif;
    font-size:34px; line-height:1; letter-spacing:-.02em;
  }
  .meter-count strong{
    background:linear-gradient(135deg,var(--violet),var(--cyan));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    font-weight:500;
  }
  .meter-count span{ color:var(--ink-faint); font-size:18px; }

  .meter-track{
    position:relative; height:2px; border-radius:2px;
    background:rgba(255,255,255,0.06); overflow:hidden;
    margin-bottom:18px;
  }
  .meter-fill{
    position:absolute; left:0; top:0; bottom:0; width:0%;
    background:linear-gradient(90deg,var(--violet),var(--cyan));
    box-shadow:0 0 14px rgba(155,124,248,.6);
    transition:width .55s cubic-bezier(.4,0,.2,1);
  }

  /* ── Card stack ── */
  .card-stack{
    flex:1; position:relative;
    display:flex; align-items:center; justify-content:center;
    min-height:0; perspective:1200px;
  }

  .qcard-back{
    position:absolute;
    width:calc(100% - 32px); max-width:480px;
    height:80px; border-radius:24px;
    border:1px solid var(--line);
    background:rgba(255,255,255,0.02);
    transform:scale(.94) translateY(24px);
    opacity:0;
    transition:transform .42s cubic-bezier(.4,0,.2,1), opacity .42s;
    pointer-events:none;
  }
  .qcard-back.peek{ opacity:.5; transform:scale(.96) translateY(14px); }

  .qcard{
    position:relative; z-index:5;
    width:calc(100% - 8px); max-width:520px;
    border-radius:24px;
    border:1px solid var(--line);
    background:var(--glass-strong);
    backdrop-filter:blur(20px) saturate(140%);
    overflow:hidden;
    cursor:grab; user-select:none; touch-action:pan-y;
    will-change:transform;
    box-shadow:
      0 0 0 1px rgba(255,255,255,.04) inset,
      0 30px 80px rgba(0,0,0,.6),
      0 8px 32px rgba(155,124,248,.08);
    animation:qcardEntry .65s cubic-bezier(.34,1.3,.64,1);
  }
  @keyframes qcardEntry{
    from{transform:scale(.94) translateY(20px);opacity:0}
    to{transform:scale(1) translateY(0);opacity:1}
  }
  .qcard:active{cursor:grabbing}
  .qcard::before{
    content:""; position:absolute; top:0; left:0; right:0; height:1px;
    background:linear-gradient(90deg,transparent,rgba(155,124,248,.6),rgba(34,211,238,.4),transparent);
  }
  .qcard::after{
    content:""; position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(ellipse 80% 40% at 50% 0%, rgba(155,124,248,.08), transparent 60%);
  }

  .qcard-body{
    position:relative; z-index:2;
    padding:32px 28px 26px;
  }

  .qcard-head{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:24px;
  }
  .qcard-axis{
    display:inline-flex; align-items:center; gap:8px;
    padding:5px 12px; border-radius:99px;
    border:1px solid rgba(155,124,248,.3);
    background:rgba(155,124,248,.08);
    font-family:"Space Mono","Noto Sans JP",monospace; font-size:11px;
    letter-spacing:.16em; text-transform:uppercase;
    color:rgba(196,181,253,.85);
  }
  .qcard-axis .axis-dot{
    width:4px;height:4px;border-radius:50%;
    background:var(--violet);box-shadow:0 0 8px var(--violet);
  }
  .qcard-num{
    font-family:"Space Mono",monospace; font-size:11px;
    letter-spacing:.18em; color:var(--ink-faint);
  }

  .qcard-prompt{
    font-family:"Space Mono",monospace; font-size:10px;
    letter-spacing:.34em; text-transform:uppercase;
    color:var(--cyan); margin-bottom:16px;
    display:flex; align-items:center; gap:10px;
  }
  .qcard-prompt::before{
    content:""; width:18px; height:1px; background:var(--cyan); opacity:.6;
  }

  .qcard-text{
    font-family:"Cormorant Garamond",serif;
    font-weight:500;
    font-size:clamp(22px, 4.5vw, 30px);
    line-height:1.45; color:var(--ink);
    margin-bottom:28px; letter-spacing:.005em;
    min-height:120px; text-wrap:pretty;
    transition:opacity .18s, transform .18s;
  }
  .qcard-text.fade-in{ animation:qfadeIn .35s cubic-bezier(.4,0,.2,1); }
  @keyframes qfadeIn{
    from{opacity:0;transform:translateY(10px)}
    to{opacity:1;transform:translateY(0)}
  }

  .qcard-options{
    display:grid; grid-template-columns:1fr 1fr; gap:1px;
    background:var(--line);
    border-radius:14px; overflow:hidden;
    margin-bottom:18px;
  }
  .qopt{
    padding:14px 16px;
    background:rgba(255,255,255,.02);
    font-size:13px; line-height:1.55;
    display:flex; align-items:flex-start; gap:8px;
  }
  .qopt-mark{
    flex-shrink:0; width:18px; height:18px;
    display:inline-flex; align-items:center; justify-content:center;
    margin-top:2px;
  }
  .qopt-mark svg{ width:18px; height:18px; }
  .qopt-like .qopt-mark{ color:rgba(244,114,182,1); }    /* pink ★ for like */
  .qopt-nope .qopt-mark{ color:rgba(34,211,238,1); }     /* cyan ★ for nope */
    .qopt-text{
    font-size:14px; line-height:1.6;
    color:#fff; font-weight:500;
    text-wrap:pretty;
    word-break:auto-phrase;
    line-break:strict;
    overflow-wrap:break-word;
  }

  .qcard-foot{
    display:flex; justify-content:space-between; align-items:center;
    padding-top:12px; border-top:1px solid var(--line);
    font-family:"Space Mono",monospace; font-size:9px;
    letter-spacing:.22em; text-transform:uppercase;
    color:var(--ink-faint);
  }
  .qcard-remain{
    color:var(--violet);
  }

  /* Swipe labels overlay (heart/star icons) */
  .swipe-label{
    position:absolute; top:50%; z-index:10;
    width:64px; height:64px; padding:0;
    display:flex; align-items:center; justify-content:center;
    border-radius:50%;
    opacity:0; pointer-events:none;
    transition:opacity .05s;
    backdrop-filter:blur(8px);
  }
  .swipe-label svg{ width:36px; height:36px; }
  .swipe-label.like{
    left:18px; transform:translateY(-50%) rotate(-8deg);
    border:2px solid var(--pink);
    color:rgba(244,114,182,.95);
    background:rgba(244,114,182,.12);
    box-shadow:0 0 28px rgba(244,114,182,.45);
  }
  .swipe-label.nope{
    right:18px; transform:translateY(-50%) rotate(8deg);
    border:2px solid rgba(34,211,238,.7);
    color:rgba(34,211,238,.85);
    background:rgba(34,211,238,.12);
    box-shadow:0 0 28px rgba(34,211,238,.4);
  }

  /* ── Scale buttons ── */
  .scale-row{
    display:flex; gap:10px; margin-top:22px;
    align-items:flex-end; justify-content:center;
    padding-bottom:4px;
  }
  .sbtn{
    flex:1; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:8px; padding:14px 6px 12px;
    border-radius:14px;
    border:1px solid var(--line);
    background:rgba(255,255,255,.02);
    backdrop-filter:blur(8px);
    transition:transform .22s cubic-bezier(.34,1.56,.64,1), border-color .2s, box-shadow .2s, background .2s;
    position:relative; overflow:hidden;
  }
  .sbtn::after{
    content:""; position:absolute; inset:0; border-radius:inherit;
    background:radial-gradient(circle at var(--rx,50%) var(--ry,50%),
                rgba(255,255,255,.18) 0%, transparent 65%);
    opacity:0; transition:opacity .4s;
  }
  .sbtn.rippling::after{ opacity:1; }
  .sbtn:hover{ transform:translateY(-3px); }
  .sbtn:active{ transform:scale(.92)!important; }

  .sbtn-icon{
    width:28px; height:28px;
    display:flex;align-items:center;justify-content:center;
  }
  .sbtn-icon svg{
    width:22px;height:22px;fill:none;
    stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;
  }
  .sbtn-label{
    font-family:"Space Mono",monospace; font-size:8px;
    letter-spacing:.18em; text-transform:uppercase;
    color:var(--ink-faint); text-align:center;
    line-height:1.35;
  }
  .sbtn-extreme{ flex:1.8; }
  .sbtn-extreme .sbtn-label{
    font-family:"Noto Sans JP",sans-serif;
    font-size:10px; letter-spacing:.04em;
    text-transform:none;
    line-height:1.4; padding:0 4px;
    text-wrap:balance;
    word-break:auto-phrase;
    line-break:strict;
    overflow-wrap:break-word;
  }

  /* ── 6-button star scale: 3 pink (like) + 3 cyan (nope) ── */
  /* Common button reset for new system */
  .sbtn{
    flex:0 0 auto;
    width:auto; padding:8px;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    border-radius:50%;
    border:1.5px solid rgba(255,255,255,.08);
    background:rgba(255,255,255,.02);
    transition:transform .22s cubic-bezier(.34,1.56,.64,1), border-color .2s, box-shadow .2s, background .2s;
    position:relative; overflow:hidden;
  }
  .sbtn:hover{ transform:translateY(-3px) scale(1.05); }
  .sbtn:active{ transform:scale(.92)!important; }
  .sbtn-icon{ display:flex; align-items:center; justify-content:center; }
  .sbtn-icon svg{ width:100%; height:100%; }

  /* sizes: large=64px, medium=52px, small=40px */
  .s-l3, .s-n3{ width:64px; height:64px; }
  .s-l3 .sbtn-icon, .s-n3 .sbtn-icon{ width:34px; height:34px; }
  .s-l2, .s-n2{ width:52px; height:52px; }
  .s-l2 .sbtn-icon, .s-n2 .sbtn-icon{ width:28px; height:28px; }
  .s-l1, .s-n1{ width:40px; height:40px; }
  .s-l1 .sbtn-icon, .s-n1 .sbtn-icon{ width:22px; height:22px; }

  /* PINK (like) — strong fill at outer, outline at inner */
  .s-l3{
    border-color:rgba(244,114,182,.6);
    background:rgba(244,114,182,.12);
    box-shadow:0 0 28px rgba(244,114,182,.35);
    color:rgba(244,114,182,1);
  }
  .s-l3:hover{ border-color:rgba(244,114,182,.95); box-shadow:0 8px 28px rgba(244,114,182,.5); }
  .s-l2{
    border-color:rgba(244,114,182,.45);
    background:rgba(244,114,182,.06);
    color:rgba(244,114,182,.9);
  }
  .s-l2:hover{ border-color:rgba(244,114,182,.8); }
  .s-l1{
    border-color:rgba(244,114,182,.3);
    color:rgba(244,114,182,.7);
  }
  .s-l1:hover{ border-color:rgba(244,114,182,.6); }

  /* CYAN (nope) — same scale, different color */
  .s-n3{
    border-color:rgba(34,211,238,.6);
    background:rgba(34,211,238,.12);
    box-shadow:0 0 28px rgba(34,211,238,.32);
    color:rgba(34,211,238,1);
  }
  .s-n3:hover{ border-color:rgba(34,211,238,.95); box-shadow:0 8px 28px rgba(34,211,238,.45); }
  .s-n2{
    border-color:rgba(34,211,238,.45);
    background:rgba(34,211,238,.06);
    color:rgba(34,211,238,.9);
  }
  .s-n2:hover{ border-color:rgba(34,211,238,.8); }
  .s-n1{
    border-color:rgba(34,211,238,.3);
    color:rgba(34,211,238,.7);
  }
  .s-n1:hover{ border-color:rgba(34,211,238,.6); }

  /* Back button */
  .back-row{
    display:flex; justify-content:center; margin-top:14px;
  }
  .back-btn{
    display:inline-flex; align-items:center; gap:8px;
    padding:8px 18px; border-radius:99px;
    background:transparent; border:1px solid var(--line);
    font-family:"Space Mono",monospace; font-size:10px;
    letter-spacing:.22em; text-transform:uppercase;
    color:var(--ink-faint); cursor:pointer;
    transition:all .2s;
  }
  .back-btn:hover:not(:disabled){
    border-color:rgba(155,124,248,.4);
    color:var(--violet);
  }
  .back-btn:disabled{ opacity:.2; pointer-events:none; }

  /* Particle canvas */
  .pcan{ position:fixed; inset:0; z-index:30; pointer-events:none; }

  /* ── Reveal overlay ── */
  .reveal{
    position:fixed; inset:0; z-index:300;
    background:radial-gradient(ellipse at 50% 50%, #0c0822 0%, #04040e 70%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:28px; opacity:0; pointer-events:none; transition:opacity .5s;
  }
  .reveal.show{ opacity:1; pointer-events:all; }
  .reveal-orbit{
    position:relative; width:200px; height:200px;
    display:flex;align-items:center;justify-content:center;
  }
  .reveal-ring{
    position:absolute; inset:0; border-radius:50%;
    border:1px solid rgba(155,124,248,.3);
    animation:revealPulse 2s ease-out infinite;
  }
  .reveal-ring:nth-child(2){ animation-delay:.7s; border-color:rgba(34,211,238,.3); }
  .reveal-ring:nth-child(3){ animation-delay:1.4s; border-color:rgba(244,114,182,.3); }
  @keyframes revealPulse{
    0%{transform:scale(.4);opacity:1}
    100%{transform:scale(1.8);opacity:0}
  }
  .reveal-core{
    width:80px; height:80px; border-radius:50%;
    background:radial-gradient(circle, var(--violet) 0%, transparent 70%);
    filter:blur(8px);
    animation:floaty 3s ease-in-out infinite;
  }
  @keyframes floaty{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
  .reveal-title{
    font-family:"Cormorant Garamond",serif; font-style:italic;
    font-size:clamp(28px,5vw,42px); line-height:1.2;
    background:linear-gradient(135deg,#fff,var(--violet) 50%,var(--cyan));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-align:center; letter-spacing:.01em;
  }
  .reveal-sub{
    font-family:"Space Mono",monospace; font-size:11px;
    letter-spacing:.34em; text-transform:uppercase;
    color:var(--ink-mute); text-align:center;
  }
  .reveal-bar-wrap{
    width:240px; height:1px; background:rgba(255,255,255,.08);
    overflow:hidden;
  }
  .reveal-bar{
    height:100%; width:0%;
    background:linear-gradient(90deg,var(--violet),var(--cyan));
    box-shadow:0 0 12px rgba(155,124,248,.6);
    transition:width .14s;
  }

  /* Confirm overlay */
  .covl{
    position:fixed; inset:0; z-index:400;
    background:rgba(0,0,0,.75); backdrop-filter:blur(16px);
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity .26s;
  }
  .covl.show{ opacity:1; pointer-events:all; }
  .csheet{
    width:calc(100% - 48px); max-width:420px;
    background:rgba(14,12,32,.95);
    border:1px solid var(--line);
    border-radius:24px; padding:32px 28px;
    transform:scale(.95); transition:transform .3s cubic-bezier(.34,1.3,.64,1);
  }
  .covl.show .csheet{ transform:scale(1); }
  .ctitle{
    font-family:"Cormorant Garamond",serif; font-size:24px;
    margin-bottom:8px; text-align:center;
  }
  .cdesc{
    font-size:13px; color:var(--ink-mute);
    line-height:1.7; text-align:center; margin-bottom:24px;
  }
  .cyes,.cno{
    width:100%; padding:14px; border-radius:99px;
    font-family:"Space Mono",monospace; font-size:11px;
    letter-spacing:.22em; text-transform:uppercase;
    cursor:pointer; transition:all .2s;
    border:1px solid var(--line);
  }
  .cyes{
    background:linear-gradient(135deg,var(--violet),var(--pink));
    color:#fff; border-color:transparent;
    margin-bottom:10px;
  }
  .cyes:hover{ transform:translateY(-2px); box-shadow:0 12px 32px rgba(155,124,248,.4); }
  .cno{
    background:transparent; color:var(--ink-mute);
  }
  .cno:hover{ border-color:var(--ink-mute); color:var(--ink); }

  @media (max-width:480px){
    /* Make the wrap scrollable instead of fixed-viewport to prevent overlap */
    .quiz-wrap{
      position:static; padding:80px 16px 80px;
      max-width:100%;
    }
    body{ min-height:100vh; }
    .card-stack{
      align-items:flex-start;
      padding-top:8px;
      min-height:auto;
    }
    .qcard-body{padding:24px 18px 20px}
    .qcard-text{font-size:20px;min-height:80px;margin-bottom:18px}
    .qcard-options{grid-template-columns:1fr}
    .qopt{padding:12px 14px;font-size:13px}
    .qopt-text{font-size:14px;line-height:1.55}
    /* Compact invite banner on mobile */
    .invite-banner{ padding:12px 14px; margin:0 0 14px; }
    .ib-char-wrap{ width:52px; height:52px; }
    .ib-q-mark{ font-size:30px; line-height:1.2; padding-bottom:.08em; }
    .ib-cross{ font-size:18px; }
    .ib-pair{ gap:10px; margin-bottom:8px; }
    .invite-banner .ib-text{ font-size:13px; }
    .invite-banner .ib-sub{ font-size:11px; margin-top:3px; }
    .scale-row{gap:6px; margin-top:28px; align-items:flex-end; padding-bottom:8px}
    .s-l3,.s-n3{width:54px;height:54px}
    .s-l2,.s-n2{width:44px;height:44px}
    .s-l1,.s-n1{width:34px;height:34px}
    .s-l3 .sbtn-icon,.s-n3 .sbtn-icon{width:28px;height:28px}
    .s-l2 .sbtn-icon,.s-n2 .sbtn-icon{width:24px;height:24px}
    .s-l1 .sbtn-icon,.s-n1 .sbtn-icon{width:18px;height:18px}
    .meter-count{font-size:28px}
  }

  /* Invite banner (招待元 × ? のペア表示) */
  .invite-banner{
    margin:0 auto 20px; max-width:560px;
    padding:18px 22px;
    border-radius:18px;
    background:
      radial-gradient(circle at 20% 50%, rgba(244,114,182,.18), transparent 60%),
      radial-gradient(circle at 80% 50%, rgba(34,211,238,.14), transparent 60%),
      linear-gradient(135deg, rgba(60,30,80,.45), rgba(8,6,22,.5));
    border:1px solid rgba(244,114,182,.35);
    text-align:center;
  }
  .ib-pair{
    display:flex; align-items:center; justify-content:center;
    gap:14px; margin-bottom:12px; flex-wrap:nowrap;
  }
  .ib-side{ flex:0 0 auto; }
  .ib-char-wrap{
    width:72px; height:72px;
    display:flex; align-items:center; justify-content:center;
    background:radial-gradient(ellipse at 50% 60%, rgba(124,58,237,.2) 0%, rgba(0,0,0,0) 70%);
    border-radius:16px;
  }
  .ib-char-img{
    width:100%; height:100%; object-fit:contain;
    filter:drop-shadow(0 6px 16px rgba(155,124,248,.5));
  }
  .ib-char-unknown{
    background:radial-gradient(ellipse at 50% 60%, rgba(34,211,238,.16) 0%, rgba(0,0,0,0) 70%);
    border:1.5px dashed rgba(34,211,238,.4);
  }
  .ib-q-mark{
    font-family:"Cormorant Garamond",serif;
    font-size:38px; font-style:italic; font-weight:500;
    background:linear-gradient(135deg,rgba(34,211,238,.95),rgba(155,124,248,.85));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    line-height:1.2;
    padding:0 0 .08em;
    display:inline-block;
  }
  .ib-cross{
    font-family:"Cormorant Garamond",serif; font-style:italic;
    font-size:24px;
    background:linear-gradient(135deg,var(--violet),var(--pink));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    flex-shrink:0;
  }
  .invite-banner .ib-text{
    font-family:"Noto Sans JP",sans-serif;
    font-size:15px; color:#fff; font-weight:600;
    line-height:1.5; text-wrap:balance;
  }
  .invite-banner .ib-from-name{
    color:var(--pink); font-weight:700;
  }
  .invite-banner .ib-sub{
    display:block;
    font-size:12px; color:var(--ink-mute);
    font-weight:400;
    letter-spacing:.04em;
    margin-top:6px;
  }
  @media (max-width:480px){
    .invite-banner{ padding:14px 16px; margin:0 12px 16px; }

<div class="quiz-wrap">

        <div class="qcard-head">

            <span class="axis-dot"></span>

  <div class="scale-row">
<button class="sbtn s-l3" data-val="3" aria-label="like strong">
      <span class="sbtn-icon"><svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"><path d="M12 3l2.5 6.5L21 10l-5 4.5L17.5 21 12 17.5 6.5 21 8 14.5 3 10l6.5-.5z"/></svg></span>
    </button>
    <button class="sbtn s-l2" data-val="2" aria-label="like medium">
      <span class="sbtn-icon"><svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"><path d="M12 3l2.5 6.5L21 10l-5 4.5L17.5 21 12 17.5 6.5 21 8 14.5 3 10l6.5-.5z"/></svg></span>
    </button>
    <button class="sbtn s-l1" data-val="1" aria-label="like weak">
      <span class="sbtn-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"><path d="M12 3l2.5 6.5L21 10l-5 4.5L17.5 21 12 17.5 6.5 21 8 14.5 3 10l6.5-.5z"/></svg></span>
    </button>

    </button>
    <button class="sbtn s-n2" data-val="-2" aria-label="nope medium">
      <span class="sbtn-icon"><svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"><path d="M12 3l2.5 6.5L21 10l-5 4.5L17.5 21 12 17.5 6.5 21 8 14.5 3 10l6.5-.5z"/></svg></span>
    </button>
    <button class="sbtn s-n3" data-val="-3" aria-label="nope strong">
      <span class="sbtn-icon"><svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"><path d="M12 3l2.5 6.5L21 10l-5 4.5L17.5 21 12 17.5 6.5 21 8 14.5 3 10l6.5-.5z"/></svg></span>

</div>

<!-- Confirm restart -->
<div class="covl" id="covl">
  <div class="csheet">
    <div class="ctitle">Restart from question 1?</div>

<script src="questions.js?v=16"></script>
<script src="types.js?v=16"></script>
<script src="nighttype-shell.js"></script>
<script>
  // ── State ──
  let idx = 0;
  const history = [];
  const axisScores = { numa:0, sm:0, ai:0, gt:0 };
  const tieBreakers = { numa:null, sm:null, ai:null, gt:null };

  // スコアリング: 重み2はval×2、重み1は底上げ(強4,中3,弱2)
  const W1_SCORE = {3:4, 2:3, 1:2, '-1':-2, '-2':-3, '-3':-4};
  function calcScore(q, val){
    if(q.weight === 2) return val * 2;
    return W1_SCORE[val] || 0;
  }
  function addAxisScore(q,val){
    axisScores[q.axis] += calcScore(q, val);
    if(q.weight === 2) tieBreakers[q.axis] = val>0?1:-1;
  }
  function undoAxisScore(q,val){
    axisScores[q.axis] -= calcScore(q, val);
  }
  // (val is now passed directly: -2/-1/0/+1/+2 instead of sign ±1)
  function getFinalTypeCode(){
    const judge = ax=>{
      const s = axisScores[ax];
      if(s>0) return 'A';
      if(s<0) return 'B';
      const tb = tieBreakers[ax];
      return tb!==null ? (tb>0?'A':'B') : 'B';
    };
    const numaStr = judge('numa')==='A' ? 'numa' : 'shio';
    const smStr   = judge('sm')==='A'   ? 'S'    : 'M';
    const aiStr   = judge('ai')==='A'   ? 'ai'   : 'yoku';
    const gtStr   = judge('gt')==='A'   ? 'G'    : 'T';
    return TYPE_MAP[`${numaStr}_${smStr}_${aiStr}_${gtStr}`] || 'A1';
  }

  // ── DOM refs ──
  const card    = document.getElementById('qcard');
  const cardBack= document.getElementById('cardBack');
  const qText   = document.getElementById('qText');
  const qNum    = document.getElementById('qNum');
  const qIdx    = document.getElementById('qIdx');
  const mFill   = document.getElementById('mFill');
  const remain  = document.getElementById('remain');
  const axisLbl = document.getElementById('axisLabel');
  const optLike = document.getElementById('optLike');
  const optNope = document.getElementById('optNope');
  const lblLike = document.getElementById('lblLike');
  const lblNope = document.getElementById('lblNope');
  const backBtn = document.getElementById('backBtn');
  const reveal  = document.getElementById('reveal');
  const revealBar=document.getElementById('revealBar');
  const pcan    = document.getElementById('pc');
  const pctx    = pcan.getContext('2d');

  function resize(){ pcan.width=innerWidth; pcan.height=innerHeight; }
  resize(); addEventListener('resize', resize);

  // Restart query
  if(new URLSearchParams(location.search).get('restart')==='1'){
    localStorage.removeItem('nightTypeResult');
    localStorage.removeItem('nightTypeScores');
  }

  const AXIS_LBL = {
    numa:'沼 · 塩',
    sm:  'S · M',
    ai:  '愛 · 欲',
    gt:  'Give · Take'
  };

  function pad(n){ return n<10 ? '0'+n : ''+n; }

  function show(animate){
    const q = questions[idx];
    if(animate){
      qText.classList.remove('fade-in');
      void qText.offsetWidth;
      qText.classList.add('fade-in');
    }
    qText.textContent = q.text;
    qNum.textContent  = pad(idx+1) + ' · ' + pad(questions.length);
    qIdx.textContent  = pad(idx+1);
    remain.textContent= questions.length - idx;
    backBtn.disabled  = idx===0;
    cardBack.classList.toggle('peek', idx+1 < questions.length);
    mFill.style.width = (idx/questions.length*100)+'%';
    axisLbl.textContent = AXIS_LBL[q.axis] || q.axis.toUpperCase();
    optNope.textContent = q.nope;
    optLike.textContent = q.like;
    // Also populate the extreme button labels with answer text (truncated)
    const lblBtnLike = document.getElementById('lblBtnLike');
    const lblBtnNope = document.getElementById('lblBtnNope');
    if(lblBtnLike) lblBtnLike.textContent = q.like.length>16 ? q.like.slice(0,16)+'…' : q.like;
    if(lblBtnNope) lblBtnNope.textContent = q.nope.length>16 ? q.nope.slice(0,16)+'…' : q.nope;
  }

  // ── Sound ──
  let ac = null;
  function sound(val){
    try{
      if(!ac) ac = new (window.AudioContext||window.webkitAudioContext)();
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination); o.type='sine';
      const m = {2:[555,820],1:[475,640],0:[360,360],'-1':[325,215],'-2':[285,155]};
      const [f0,f1] = m[val] || [360,360];
      o.frequency.setValueAtTime(f0, ac.currentTime);
      o.frequency.exponentialRampToValueAtTime(Math.max(f1,10), ac.currentTime+0.13);
      g.gain.setValueAtTime(0.06, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.22);
      o.start(); o.stop(ac.currentTime+0.3);
    }catch(e){}
  }

  // ── Particles ──
  let parts = [];
  function spawnParts(val,x,y){
    const pos = val>0;
    const palette = pos
      ? ['#F472B6','#fda4af','#c084fc','#9B7CF8','#fff']      // like = ♥ pink/purple
      : val===0 ? ['#a5b4fc','#94a3b8']                        // neutral = soft blue
                : ['#22d3ee','#67e8f9','#a5f3fc','#9B7CF8'];   // nope = ★ cyan
    const n = pos ? (val===2?32:22) : val===0 ? 10 : 16;
    for(let i=0;i<n;i++){
      const a = (Math.PI*2/n)*i + Math.random()*.7;
      const s = 2.5 + Math.random()*4.5*(Math.abs(val)/2 || 0.4);
      parts.push({
        x,y,
        vx:Math.cos(a)*s,
        vy:Math.sin(a)*s - (pos?3:0.5),
        col:palette[i%palette.length],
        r:pos?2.5+Math.random()*4 : 1.8+Math.random()*3,
        life:1, dec:0.022+Math.random()*0.018,
        g:0.18,
        glow:pos
      });
    }
  }
  function animP(){
    pctx.clearRect(0,0,pcan.width,pcan.height);
    parts = parts.filter(p=>p.life>0);
    parts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.vy+=p.g; p.vx*=0.97; p.life-=p.dec;
      pctx.globalAlpha = Math.max(0,p.life);
      if(p.glow){
        pctx.shadowColor = p.col;
        pctx.shadowBlur = p.r*4;
      } else {
        pctx.shadowBlur = 0;
      }
      pctx.fillStyle = p.col;
      pctx.beginPath();
      pctx.arc(p.x,p.y,Math.max(0.1,p.r*p.life),0,Math.PI*2);
      pctx.fill();
    });
    pctx.globalAlpha = 1; pctx.shadowBlur = 0;
    if(parts.length) requestAnimationFrame(animP);
    else pctx.clearRect(0,0,pcan.width,pcan.height);
  }

  // ── Card fly ──
  function fly(right, cb){
    const tx = right ? innerWidth*1.5 : -innerWidth*1.5;
    card.style.transition = 'transform .42s cubic-bezier(.5,0,1,.5), opacity .32s';
    card.style.transform  = `translateX(${tx}px) rotate(${right?20:-20}deg)`;
    card.style.opacity    = '0';
    setTimeout(()=>{
      card.style.transition = '';
      card.style.transform  = '';
      card.style.opacity    = '';
      lblLike.style.opacity = lblNope.style.opacity = 0;
      card.style.boxShadow  = '';
      cb();
    }, 420);
  }

  // ── Answer ──
  function answer(val){
    const q = questions[idx];
    const sign = val>0 ? 1 : val<0 ? -1 : 0;
    history.push({axis:q.axis, weight:q.weight, sign, val});
    if(val!==0) addAxisScore(q, val);
    sound(val);
    const r = card.getBoundingClientRect();
    spawnParts(val, r.left+r.width/2, r.top+r.height/2);
    requestAnimationFrame(animP);
    idx++;
    if(idx<questions.length){
      fly(val<0, ()=>show(true));   // val<0 = nope (★ on right) → fly right
    } else {
      // finish
      const code = getFinalTypeCode();
      localStorage.setItem('nightTypeResult', code);
      localStorage.setItem('nighttype_completed', code);
      // Analytics: quiz_completed
      if(typeof window.dispatchEvent === 'function'){
        window.dispatchEvent(new CustomEvent('quiz_completed', {detail:{type:code, from: new URLSearchParams(location.search).get('from') || null}}));
      }
      if(typeof gtag === 'function'){ try{ gtag('event', 'quiz_completed', {type:code}); }catch(_){} }
      localStorage.setItem('nightTypeScores', JSON.stringify(axisScores));
      fly(val<0, ()=>{   // val<0 = nope (★ on right) → fly right
        reveal.classList.add('show');
        let p = 0;
        const iv = setInterval(()=>{
          p = Math.min(p+2, 100);
          revealBar.style.width = p+'%';
          if(p>=100){
            clearInterval(iv);
            setTimeout(()=>location.href = 'result.html' + (new URLSearchParams(location.search).get('from') ? '?from=' + new URLSearchParams(location.search).get('from') : ''), 600);
          }
        }, 30);
      });
    }
  }

  // ── Auto-apply Q1 answer from visitor landing (実装指示#3 §6) ──
  (function consumeQ1Answer(){
    try{
      const stored = sessionStorage.getItem('nighttype_q1_answer');
      if(!stored) return;
      const val = parseInt(stored, 10);
      sessionStorage.removeItem('nighttype_q1_answer');
      if(isNaN(val) || val < -3 || val > 3) return;
      // Apply as if user answered Q1 with this val
      const q = questions[0];
      const sign = val>0 ? 1 : val<0 ? -1 : 0;
      history.push({axis:q.axis, weight:q.weight, sign, val});
      if(val !== 0) addAxisScore(q, val);
      idx = 1; // skip to Q2
    }catch(_){}
  })();

  // ── Buttons + ripple ──
  document.querySelectorAll('.sbtn').forEach(b=>{
    b.addEventListener('click', e=>{
      const rect = b.getBoundingClientRect();
      b.style.setProperty('--rx', ((e.clientX-rect.left)/rect.width*100)+'%');
      b.style.setProperty('--ry', ((e.clientY-rect.top)/rect.height*100)+'%');
      b.classList.add('rippling');
      setTimeout(()=>b.classList.remove('rippling'), 400);
      answer(+b.dataset.val);
    });
  });

  backBtn.addEventListener('click', ()=>{
    if(!history.length) return;
    const last = history.pop();
    idx--;
    if(last.val!==0) undoAxisScore({axis:last.axis,weight:last.weight}, last.val);
    card.style.transition = 'transform .38s cubic-bezier(.34,1.3,.64,1), opacity .26s';
    card.style.transform  = 'scale(.94) translateY(10px)';
    card.style.opacity    = '0.45';
    setTimeout(()=>{
      card.style.transition = card.style.transform = card.style.opacity = '';
      show(true);
    }, 240);
  });

  // ── Swipe ──
  let sx=0,sy=0,drag=false,cx=0,tapT=0;
  const T1=60,T2=120,TAP_MAX=14,TAP_MS=260;
  function ds(x,y){ sx=x;sy=y;drag=true;cx=0;tapT=Date.now(); }
  function dm(x,y){
    if(!drag) return;
    const dx=x-sx,dy=y-sy;
    if(Math.abs(dy)>Math.abs(dx)*1.5){ drag=false; rc(); return; }
    cx=dx;
    const r = Math.min(Math.abs(dx)/T2, 1);
    card.style.transform = `translateX(${dx*.55}px) rotate(${dx*.04}deg)`;
    if(dx<-12){
      // swipe LEFT = LIKE (matches ♥ button on left)
      lblLike.style.opacity = Math.min(r*1.4,1);
      lblNope.style.opacity = 0;
      card.style.boxShadow = `0 0 0 1px rgba(244,114,182,${.6*r}), 0 30px 80px rgba(0,0,0,.6), 0 0 50px rgba(244,114,182,${.18*r})`;
    } else if(dx>12){
      // swipe RIGHT = NOPE (matches ★ button on right)
      lblNope.style.opacity = Math.min(r*1.4,1);
      lblLike.style.opacity = 0;
      card.style.boxShadow = `0 0 0 1px rgba(155,124,248,${.4*r}), 0 30px 80px rgba(0,0,0,.6)`;
    } else {
      lblLike.style.opacity = lblNope.style.opacity = 0;
      card.style.boxShadow = '';
    }
  }
  function rc(){
    lblLike.style.opacity = lblNope.style.opacity = 0;
    card.style.boxShadow = '';
    card.style.transition = 'transform .48s cubic-bezier(.34,1.56,.64,1)';
    card.style.transform  = '';
    setTimeout(()=>card.style.transition = '', 480);
  }
  function de(){
    if(!drag) return;
    drag = false;
    if(Math.abs(cx)<TAP_MAX && Date.now()-tapT<TAP_MS){
      answer(0); return;
    }
    if(cx<-T2)     answer(3);    // strong left swipe = strong like (+3)
    else if(cx<-T1)answer(2);    // mild left swipe = medium like (+2)
    else if(cx>T2) answer(-3);   // strong right swipe = strong nope (-3)
    else if(cx>T1) answer(-2);   // mild right swipe = medium nope (-2)
    else rc();
  }
  card.addEventListener('touchstart', e=>ds(e.touches[0].clientX,e.touches[0].clientY), {passive:true});
  card.addEventListener('touchmove',  e=>dm(e.touches[0].clientX,e.touches[0].clientY), {passive:true});
  card.addEventListener('touchend', de);
  card.addEventListener('mousedown', e=>{ ds(e.clientX,e.clientY); card.style.cursor='grabbing'; });
  addEventListener('mousemove', e=>dm(e.clientX,e.clientY));
  addEventListener('mouseup', ()=>{ card.style.cursor=''; de(); });

  // ── Restart confirm ──
  const covl = document.getElementById('covl');
  document.querySelector('.nt-brand').addEventListener('click', e=>{
    if(idx>0){ e.preventDefault(); covl.classList.add('show'); }
  });
  document.getElementById('cyes').addEventListener('click', ()=>location.href='quiz.html?restart=1');
  document.getElementById('cno').addEventListener('click', ()=>covl.classList.remove('show'));

  show(false);

  // Analytics: quiz_started (実装指示#3 §9)
  (function fireQuizStarted(){
    const fromParam = new URLSearchParams(location.search).get('from');
    if(typeof window.dispatchEvent === 'function'){
      window.dispatchEvent(new CustomEvent('quiz_started', {detail:{from: fromParam}}));
    }
    if(typeof gtag === 'function'){ try{ gtag('event', 'quiz_started', {from: fromParam}); }catch(_){} }
  })();

  // Show invite banner if ?from= is present (pair display)
  (function showInviteBanner(){
    const params = new URLSearchParams(location.search);
    const fromCode = params.get('from');
    if(!fromCode || typeof types === 'undefined') return;
    const fromT = types[fromCode];
    if(!fromT) return;
    const banner = document.getElementById('inviteBanner');
    if(!banner) return;
    document.getElementById('ibFromName').textContent = fromT.name + '(' + fromCode + ')';
    const img = document.getElementById('ibFromImg');
    if(img){
      img.src = fromT.image || ('images/' + fromCode + '.png');
      img.alt = fromT.name;
    }
    banner.style.display = 'block';
  })();
</script>
