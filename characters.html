<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>キャラ一覧｜ナイトタイプ</title>
  <link rel="stylesheet" href="./style.css"/>
  <style>
    .chars-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:0 0 40px;}
    .char-card{border-radius:18px;background:var(--surface);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:all 0.22s;text-decoration:none;color:var(--white);display:block;}
    .char-card:hover{transform:translateY(-4px);box-shadow:0 12px 36px rgba(124,58,237,0.35);border-color:var(--purple-l);}
    .char-img-wrap{width:100%;aspect-ratio:1/1;overflow:hidden;position:relative;background:radial-gradient(circle at 50% 60%,rgba(124,58,237,0.18),rgba(10,10,15,0.9));display:flex;align-items:center;justify-content:center;}
    .char-img-wrap img{width:100%;height:100%;object-fit:cover;}
    .char-img-wrap .char-icon-fb{font-size:4rem;}
    .char-type-code{position:absolute;top:8px;left:8px;background:rgba(10,10,15,0.75);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:8px;font-family:'Syne',sans-serif;font-size:0.58rem;font-weight:700;color:var(--purple-ll);padding:3px 8px;}
    .char-info{padding:10px 12px 13px;}
    .char-tagline{font-size:0.6rem;color:var(--purple-ll);letter-spacing:0.05em;margin-bottom:4px;font-family:'Syne',sans-serif;}
    .char-name{font-family:'Syne',sans-serif;font-weight:700;font-size:0.8rem;line-height:1.3;}

    /* Modal */
    .modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.82);backdrop-filter:blur(12px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s;}
    .modal-overlay.open{opacity:1;pointer-events:all;}
    .modal{width:100%;max-width:480px;background:var(--surface);border-radius:24px 24px 0 0;border:1px solid var(--border);border-bottom:none;padding:0 0 52px;transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);max-height:92vh;overflow-y:auto;}
    .modal-overlay.open .modal{transform:translateY(0);}
    .modal-handle{width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,0.12);margin:14px auto 0;}
    .modal-top{position:relative;}
    .modal-img{width:100%;max-height:260px;object-fit:contain;padding:16px 48px 0;}
    .modal-img-fb{font-size:5.5rem;text-align:center;padding:24px 0 0;}
    .modal-glow{position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(transparent,var(--surface));pointer-events:none;}
    .modal-body{padding:16px 22px 0;}
    .modal-code{font-size:0.56rem;letter-spacing:0.28em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
    .modal-tagline{font-size:0.72rem;color:var(--purple-ll);font-family:'Syne',sans-serif;margin-bottom:8px;}
    .modal-name{font-family:'Syne',sans-serif;font-weight:800;font-size:1.55rem;line-height:1.15;margin-bottom:10px;background:linear-gradient(135deg,var(--purple-ll),var(--pink-l));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

    /* プロフィール */
    .profile-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
    .profile-chip{padding:5px 12px;border-radius:999px;font-size:0.65rem;font-family:'Syne',sans-serif;font-weight:700;}
    .profile-chip.age{background:rgba(124,58,237,0.15);border:1px solid rgba(168,85,247,0.3);color:var(--purple-ll);}
    .profile-chip.mbti{background:rgba(236,72,153,0.12);border:1px solid rgba(236,72,153,0.3);color:var(--pink-l);}
    .keyword-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
    .keyword-tag{padding:4px 10px;border-radius:6px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);font-size:0.62rem;color:var(--muted);}
    .quote-block{padding:12px 16px;border-radius:12px;background:rgba(124,58,237,0.08);border-left:3px solid var(--purple);margin-bottom:14px;font-style:italic;font-size:0.85rem;color:var(--purple-ll);line-height:1.6;}

    .modal-divider{height:1px;background:rgba(255,255,255,0.06);margin:14px 0;}
    .modal-desc{font-size:0.84rem;line-height:1.88;color:#9d99b0;}
    .modal-detail{font-size:0.8rem;line-height:1.85;color:#7a7690;margin-top:10px;padding:12px 14px;border-radius:10px;background:rgba(255,255,255,0.025);border-left:2px solid rgba(124,58,237,0.4);}
    .modal-section-title{font-size:0.58rem;letter-spacing:0.25em;text-transform:uppercase;margin:18px 0 10px;}
    .modal-section-title.g{color:rgba(168,85,247,0.7);}
    .modal-section-title.b{color:rgba(236,72,153,0.7);}
    .compat-chips{display:flex;flex-direction:column;gap:8px;}
    .compat-chip-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;background:var(--surface2);}
    .compat-chip-row.good{border-left:2px solid rgba(168,85,247,0.5);}
    .compat-chip-row.bad{border-left:2px solid rgba(236,72,153,0.5);}
    .compat-chip-row img{width:36px;height:36px;border-radius:10px;object-fit:cover;flex-shrink:0;}
    .compat-chip-row .cc-icon{width:36px;height:36px;border-radius:10px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
    .compat-chip-right{flex:1;min-width:0;}
    .compat-chip-name{font-family:'Syne',sans-serif;font-weight:700;font-size:0.75rem;margin-bottom:2px;}
    .compat-chip-reason{font-size:0.66rem;color:var(--muted);line-height:1.5;}
    .modal-close{width:calc(100% - 44px);margin:20px 22px 0;padding:14px;border-radius:12px;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'Syne',sans-serif;font-size:0.75rem;letter-spacing:0.1em;cursor:pointer;transition:all 0.2s;}
    .modal-close:hover{border-color:var(--purple-l);color:var(--white);}
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="noise"></div>
<nav class="navbar">
  <a href="index.html" class="nav-logo">NightType</a>
  <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
</nav>
<div class="drawer" id="drawer">
  <a href="index.html"><span class="icon">🏠</span>ホーム</a>
  <a href="quiz.html"><span class="icon">🌙</span>診断する</a>
  <a href="characters.html" class="active"><span class="icon">🎴</span>キャラ一覧</a>
  <a href="compat.html"><span class="icon">💜</span>相性チェック</a>
  <a href="matrix.html"><span class="icon">📊</span>相性マトリクス</a>
</div>
<div class="drawer-overlay" id="drawer-overlay"></div>

<div class="page">
  <div style="max-width:480px;margin:0 auto;padding:24px 16px 0;">
    <div class="page-header"><h1>キャラ一覧</h1><p>タップして詳細を見る</p></div>
    <div class="chars-grid" id="charsGrid"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="modalContent"></div>
    <div style="padding:0 22px 0">
      <a id="modalTypeLink" href="#" style="display:block;padding:14px;border-radius:12px;background:linear-gradient(135deg,rgba(124,58,237,0.2),rgba(236,72,153,0.15));border:1px solid rgba(124,58,237,0.4);color:var(--purple-ll);font-family:'Syne',sans-serif;font-weight:700;font-size:0.75rem;letter-spacing:0.1em;text-align:center;text-decoration:none;margin-bottom:10px;transition:all 0.2s">
        このタイプの詳細ページを見る →
      </a>
    </div>
    <a id="modalTypeLink" href="#" style="display:flex;align-items:center;justify-content:center;gap:6px;margin:14px 22px 0;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,rgba(124,58,237,0.8),rgba(236,72,153,0.7));color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:0.75rem;letter-spacing:0.1em;text-decoration:none">
      📖 このタイプの詳細を見る →
    </a>
    <button class="modal-close" id="modalClose">閉じる</button>
  </div>
</div>

<script src="./types.js"></script>
<script src="./common.js"></script>
<script>
const grid=document.getElementById('charsGrid');
const overlay=document.getElementById('modalOverlay');
const modalContent=document.getElementById('modalContent');

Object.entries(types).forEach(([code,d],i)=>{
  const card=document.createElement('a');
  card.id=code; card.className='char-card'; card.href='type.html?type='+code;
  card.style.cssText=`opacity:0;animation:popIn 0.5s ease ${0.04*i}s forwards`;
  card.innerHTML=`
    <div class="char-img-wrap">
      ${d.image?`<img src="${d.image}" alt="${d.name}" loading="lazy"/>`:`<div class="char-icon-fb">${d.icon}</div>`}
      <div class="char-type-code">${code}</div>
    </div>
    <div class="char-info">
      <div class="char-tagline">${d.tagline}</div>
      <div class="char-name">${d.name}</div>
      ${d.axisCode?`<div style="margin-top:5px"><span style="font-family:'Syne',sans-serif;font-size:0.48rem;font-weight:700;letter-spacing:0.12em;padding:2px 7px;border-radius:999px;background:rgba(124,58,237,0.18);border:1px solid rgba(168,85,247,0.35);color:rgba(196,181,253,0.85)">${d.axisCode}</span></div>`:''}
    </div>`;
  card.addEventListener('click',e=>{e.preventDefault();openModal(code);});
  card.setAttribute('data-type',code);
  grid.appendChild(card);
});

if(location.hash){const c=location.hash.slice(1);if(types[c])setTimeout(()=>openModal(c),400);}

function openModal(code){
  const d=types[code];
  const keywords=(d.keyword||[]).map(k=>`<span class="keyword-tag">${k}</span>`).join('');
  const goodChips=d.good.map(c=>{
    const t=types[c];
    return `<div class="compat-chip-row good">
      ${t.image?`<img src="${t.image}" alt="">`:`<div class="cc-icon">${t.icon}</div>`}
      <div class="compat-chip-right">
        <div class="compat-chip-name">${t.name}</div>
        <div class="compat-chip-reason">${t.tagline}</div>
      </div></div>`;
  }).join('');
  const badChips=d.bad.map(c=>{
    const t=types[c];
    return `<div class="compat-chip-row bad">
      ${t.image?`<img src="${t.image}" alt="">`:`<div class="cc-icon">${t.icon}</div>`}
      <div class="compat-chip-right">
        <div class="compat-chip-name">${t.name}</div>
        <div class="compat-chip-reason">${t.tagline}</div>
      </div></div>`;
  }).join('');

  modalContent.innerHTML=`
    <div class="modal-top">
      ${d.image?`<img class="modal-img" src="${d.image}" alt="${d.name}"/>`:`<div class="modal-img-fb">${d.icon}</div>`}
      <div class="modal-glow"></div>
    </div>
    <div class="modal-body">
      <div class="modal-code">${code}${d.axisCode?` · <span style="font-size:0.5rem;letter-spacing:0.15em;color:rgba(196,181,253,0.7)">${d.axisCode}</span>`:''}</div>
      <div class="modal-tagline">"${d.tagline}"</div>
      <div class="modal-name">${d.name}</div>
      <div class="profile-row">
        ${d.age?`<span class="profile-chip age">推定${d.age}歳</span>`:''}
        ${d.mbti?`<span class="profile-chip mbti">${d.mbti}</span>`:''}
      </div>
      ${d.keyword?`<div class="keyword-row">${keywords}</div>`:''}
      ${d.quote?`<div class="quote-block">${d.quote}</div>`:''}
      <div class="modal-divider"></div>
      <p class="modal-desc">${d.description}</p>
      <div class="modal-detail">${d.detail}</div>
      <div class="modal-section-title g">◇ 相性がいいタイプ</div>
      <div class="compat-chips">${goodChips}</div>
      ${d.goodReason?`<p style="font-size:0.7rem;color:var(--muted);margin-top:8px;line-height:1.6;padding:0 2px">${d.goodReason}</p>`:''}
      <div class="modal-section-title b">◇ 刺激が強すぎるタイプ</div>
      <div class="compat-chips">${badChips}</div>
      ${d.badReason?`<p style="font-size:0.7rem;color:var(--muted);margin-top:8px;line-height:1.6;padding:0 2px">${d.badReason}</p>`:''}
    </div>`;
  document.getElementById('modalTypeLink').href = 'type/'+code+'.html';
  const tLink=document.getElementById('modalTypeLink');if(tLink)tLink.href='type.html?type='+code;
  overlay.classList.add('open');
  document.body.style.overflow='hidden';
}

document.getElementById('modalClose').addEventListener('click',closeModal);
overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal();});
function closeModal(){overlay.classList.remove('open');document.body.style.overflow='';}
</script>
</body>
</html>
