<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Characters — NightType</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="nighttype-shell.css" />
<style>

  /* ── Hero ── */
  .ch-hero{
    max-width:920px; margin:0 auto;
    padding:140px 32px 50px;
    text-align:center;
    position:relative; z-index:5;
  }
  .ch-eyebrow{
    font-family:"Space Mono",monospace; font-size:11px;
    letter-spacing:.4em; text-transform:uppercase;
    color:var(--cyan); margin-bottom:24px;
    display:inline-flex; align-items:center; gap:12px;
  }
  .ch-eyebrow::before, .ch-eyebrow::after{
    content:""; width:36px; height:1px; background:var(--cyan); opacity:.5;
  }
  .ch-title{
    font-family:"Cormorant Garamond",serif;
    font-weight:500;
    font-size:clamp(44px, 7vw, 72px);
    line-height:1.05; letter-spacing:-.01em;
    margin-bottom:24px; text-wrap:balance;
  }
  .ch-title em{
    font-style:italic;
    background:linear-gradient(135deg,var(--violet),var(--cyan));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .ch-sub{
    font-size:15px; line-height:1.85; color:var(--ink-mute);
    max-width:560px; margin:0 auto 36px; text-wrap:pretty;
  }

  /* ── Filter bar ── */
  .ch-filters{
    display:flex; flex-wrap:wrap; justify-content:center;
    gap:8px;
    max-width:920px; margin:0 auto;
    padding:0 32px;
    position:relative; z-index:5;
  }
  .ch-filter{
    padding:10px 20px;
    border-radius:99px;
    border:1px solid var(--line);
    background:rgba(255,255,255,.02);
    backdrop-filter:blur(8px);
    font-family:"Space Mono",monospace; font-size:10px;
    letter-spacing:.18em; text-transform:uppercase;
    color:var(--ink-mute); cursor:pointer;
    transition:all .25s;
  }
  .ch-filter:hover{
    border-color:rgba(155,124,248,.4);
    color:var(--ink);
  }
  .ch-filter.active{
    border-color:var(--violet);
    background:rgba(155,124,248,.12);
    color:#fff;
    box-shadow:0 0 16px rgba(155,124,248,.25);
  }

  /* ── Grid ── */
  .ch-grid{
    max-width:1200px; margin:0 auto;
    padding:50px 32px 100px;
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));
    gap:18px;
    position:relative; z-index:5;
  }

  .ch-card{
    position:relative;
    border-radius:20px;
    border:1px solid var(--line);
    background:var(--glass);
    backdrop-filter:blur(16px) saturate(140%);
    overflow:hidden;
    cursor:pointer;
    transition:transform .4s cubic-bezier(.2,.8,.2,1),
               border-color .3s,
               box-shadow .3s;
    text-decoration:none; color:inherit;
    display:flex; flex-direction:column;
  }
  .ch-card::before{
    content:""; position:absolute; top:0; left:0; right:0; height:1px;
    background:linear-gradient(90deg, transparent, rgba(155,124,248,.5), transparent);
    opacity:0; transition:opacity .3s;
  }
  .ch-card:hover{
    transform:translateY(-6px);
    border-color:rgba(155,124,248,.4);
    box-shadow:0 30px 80px rgba(0,0,0,.5),
               0 0 40px rgba(155,124,248,.15);
  }
  .ch-card:hover::before{ opacity:1; }

  .ch-card-img-wrap{
    position:relative;
    aspect-ratio:1/1;
    overflow:hidden;
    background:radial-gradient(ellipse at 50% 70%, rgba(124,58,237,.22) 0%, #0a0a1a 70%);
  }
  .ch-card-img{
    width:100%; height:100%; object-fit:contain;
    transition:transform .8s cubic-bezier(.2,.8,.2,1);
    filter:drop-shadow(0 8px 22px rgba(124,58,237,.4));
  }
  .ch-card:hover .ch-card-img{
    transform:scale(1.06);
    filter:drop-shadow(0 12px 28px rgba(155,124,248,.55));
  }
  .ch-card-img-wrap::after{
    content:""; position:absolute; inset:0; pointer-events:none;
    background:linear-gradient(180deg, transparent 60%, rgba(4,4,14,.55) 100%);
  }
  .ch-card-code{
    position:absolute; top:14px; left:14px;
    z-index:2;
    padding:5px 10px; border-radius:99px;
    background:rgba(4,4,14,.75); backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,.12);
    font-family:"Space Mono",monospace; font-size:10px;
    letter-spacing:.18em; color:var(--violet);
  }
  .ch-card-axes{
    position:absolute; top:14px; right:14px;
    z-index:2;
    padding:5px 10px; border-radius:99px;
    background:rgba(4,4,14,.75); backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,.12);
    font-family:"Space Mono",monospace; font-size:9px;
    letter-spacing:.16em; color:var(--ink-mute);
  }

  .ch-card-body{
    padding:20px 22px 22px;
    flex:1;
    display:flex; flex-direction:column;
  }
  .ch-card-name{
    font-family:"Cormorant Garamond",serif;
    font-size:22px; font-weight:500;
    line-height:1.25; margin-bottom:8px;
    color:var(--ink);
    text-wrap:balance;
  }
  .ch-card-tagline{
    font-family:"Cormorant Garamond",serif; font-style:italic;
    font-size:14px; line-height:1.5;
    color:var(--ink-mute);
    margin-bottom:14px; text-wrap:pretty;
    flex:1;
  }
  .ch-card-keywords{
    display:flex; flex-wrap:wrap; gap:5px;
    margin-bottom:14px;
  }
  .ch-card-kw{
    padding:3px 9px; border-radius:99px;
    background:rgba(155,124,248,.08);
    border:1px solid rgba(155,124,248,.18);
    font-family:"Space Mono",monospace; font-size:9px;
    letter-spacing:.12em; color:rgba(196,181,253,.85);
  }
  .ch-card-foot{
    display:flex; justify-content:space-between; align-items:center;
    padding-top:12px;
    border-top:1px solid var(--line);
    font-family:"Space Mono",monospace; font-size:10px;
    letter-spacing:.18em; text-transform:uppercase;
    color:var(--ink-faint);
  }
  .ch-card-foot .arrow{
    color:var(--violet);
    transition:transform .25s;
  }
  .ch-card:hover .ch-card-foot .arrow{ transform:translateX(4px); }

  /* Group color hints */
  .ch-card[data-group="A"] .ch-card-code{ color:#fda4af; border-color:rgba(244,114,182,.35); }
  .ch-card[data-group="B"] .ch-card-code{ color:#a5b4fc; border-color:rgba(99,102,241,.35); }
  .ch-card[data-group="C"] .ch-card-code{ color:#67e8f9; border-color:rgba(34,211,238,.35); }
  .ch-card[data-group="D"] .ch-card-code{ color:#c4b5fd; border-color:rgba(155,124,248,.35); }

  .empty-msg{
    grid-column:1/-1;
    text-align:center; padding:60px 20px;
    font-family:"Cormorant Garamond",serif; font-style:italic;
    font-size:20px; color:var(--ink-faint);
  }

  /* ── CTA Footer ── */
  .ch-footer{
    max-width:760px; margin:0 auto;
    padding:60px 32px 100px;
    text-align:center;
    position:relative; z-index:5;
  }
  .ch-footer-title{
    font-family:"Cormorant Garamond",serif; font-style:italic;
    font-size:clamp(28px, 4.5vw, 40px);
    margin-bottom:18px; line-height:1.3;
    text-wrap:balance;
  }
  .ch-footer-sub{
    color:var(--ink-mute); font-size:14px;
    margin-bottom:32px; line-height:1.8;
  }

  @media (max-width:560px){
    .ch-hero{padding-top:110px}
    .ch-grid{padding:30px 18px 80px; gap:14px;
      grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));}
    .ch-card-body{padding:16px 16px 18px}
    .ch-card-name{font-size:18px}
    .ch-card-tagline{font-size:13px}
    .ch-filters{padding:0 18px}
    .ch-filter{padding:8px 14px; font-size:9px}
  }

  /* Reveal animation */
  .ch-card{
    opacity:0;
    animation:ntFadeUp .6s cubic-bezier(.2,.8,.2,1) both;
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>
<div class="nebula"></div>
<div class="grain"></div>
<div class="vignette"></div>

<!-- Top Nav -->
<nav class="nt-nav">
  <a href="index.html" class="nt-brand"><span class="nt-brand-mark"></span>NightType</a>
  <div class="nt-nav-links" id="navLinks">
    <a href="index.html">Home</a>
    <a href="quiz.html">Quiz</a>
    <a href="characters.html" class="active">Characters</a>
    <a href="index.html#about">About</a>
    <a href="match.html">Match</a>
    <a href="https://nighttype.base.shop/" target="_blank" rel="noopener">Items</a>
  </div>
  <button class="nt-burger" id="burger" aria-label="menu"><span></span><span></span><span></span></button>
  <div class="nt-overlay" id="navOverlay"></div>
</nav>

<!-- Hero -->
<section class="ch-hero">
  <div class="ch-eyebrow">16 Night Constellations</div>
  <h1 class="ch-title">16タイプ、<br/>それぞれが<em>ひとつの言語</em>。</h1>
  <p class="ch-sub">4軸の交差から生まれる16のタイプ。それぞれが、夜という時間に対する独自の「文法」を持っている。あなたの星と、誰の星が共鳴するか——。</p>
</section>

<!-- Filters -->
<div class="ch-filters" id="chFilters">
  <button class="ch-filter active" data-filter="all">All 16</button>
  <button class="ch-filter" data-filter="numa">Numa · 沼</button>
  <button class="ch-filter" data-filter="shio">Shio · 塩</button>
  <button class="ch-filter" data-filter="S">S</button>
  <button class="ch-filter" data-filter="M">M</button>
  <button class="ch-filter" data-filter="ai">Ai · 愛</button>
  <button class="ch-filter" data-filter="yoku">Yoku · 欲</button>
  <button class="ch-filter" data-filter="G">Give</button>
  <button class="ch-filter" data-filter="T">Take</button>
</div>

<!-- Grid -->
<div class="ch-grid" id="chGrid"></div>

<!-- Footer CTA -->
<section class="ch-footer">
  <h2 class="ch-footer-title"><em>あなたの</em>星座を見つける。</h2>
  <p class="ch-footer-sub">20問の診断であなたの夜の星座を発見しよう。</p>
  <a href="quiz.html" class="nt-btn nt-btn-primary">
    Start the Quiz <span class="arrow">→</span>
  </a>
</section>

<!-- Constellation drift (under content) -->
<div class="constellation"></div>

<script src="types.js"></script>
<script src="nighttype-shell.js"></script>
<script>
  // axisCode 形式: "N-S-A-G" / "S-M-Y-T" など
  // 1番目: numa(N) / shio(S)
  // 2番目: S / M
  // 3番目: ai(A) / yoku(Y)
  // 4番目: G / T
  // ※axisCodeの最初の "N"=Numa, "S"=Shio に注意（typesにはN-...とS-...両方ある）

  function getAxisInfo(t){
    const code = (t.axisCode || '').toUpperCase();
    const parts = code.split('-');
    const [c0,c1,c2,c3] = parts.length===4 ? parts : ['','','',''];
    return {
      numa: c0==='N',
      shio: c0==='S',
      S: c1==='S',
      M: c1==='M',
      ai: c2==='A',
      yoku: c2==='Y',
      G: c3==='G',
      T: c3==='T'
    };
  }

  function matchFilter(t, f){
    if(f==='all') return true;
    return !!getAxisInfo(t)[f];
  }

  function render(filter){
    const grid = document.getElementById('chGrid');
    const codes = Object.keys(types);
    const matches = codes.filter(c => matchFilter(types[c], filter));
    if(matches.length===0){
      grid.innerHTML = '<div class="empty-msg">No constellations match this filter.</div>';
      return;
    }
    grid.innerHTML = matches.map((c, i)=>{
      const t = types[c];
      const group = c.charAt(0); // A/B/C/D
      const axisShort = (t.axisCode || '').replace(/-/g,'·');
      const kws = (t.keyword || []).slice(0,3)
        .map(k=>`<span class="ch-card-kw">${k}</span>`).join('');
      return `
        <a class="ch-card" data-group="${group}" href="type.html?type=${c}"
           style="animation-delay:${Math.min(i*0.04, 0.6)}s">
          <div class="ch-card-img-wrap">
            <span class="ch-card-code">${c}</span>
            <span class="ch-card-axes">${axisShort}</span>
            <img class="ch-card-img" src="${t.image || `images/${c}.png`}" alt="${t.name}"
                 onerror="this.style.display='none';this.parentElement.style.background='radial-gradient(circle at 30% 30%, rgba(155,124,248,.4), #0a0a1a)'"/>
          </div>
          <div class="ch-card-body">
            <div class="ch-card-name">${t.name}</div>
            <div class="ch-card-tagline">"${t.tagline || ''}"</div>
            <div class="ch-card-keywords">${kws}</div>
            <div class="ch-card-foot">
              <span>${t.axes || ''}</span>
              <span class="arrow">→</span>
            </div>
          </div>
        </a>
      `;
    }).join('');
  }

  render('all');

  document.querySelectorAll('.ch-filter').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.ch-filter').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      render(btn.dataset.filter);
    });
  });
</script>

</body>
</html>
