<style>
  :root{
    --bg:#04040e; --panel:rgba(20,16,42,.62); --line:rgba(255,255,255,.10);
    --ink:#e9e6ff; --mute:#9a96b8; --violet:#9B7CF8; --pink:#F472B6; --cyan:#7dd8f0;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:
      radial-gradient(1200px 700px at 85% -10%, rgba(155,124,248,.16), transparent 60%),
      radial-gradient(900px 600px at -10% 30%, rgba(244,114,182,.10), transparent 55%),
      var(--bg);
    color:var(--ink); font-family:"Noto Sans JP",sans-serif; min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{ max-width:560px; margin:0 auto; padding:20px 20px 80px; }
  .brand{ display:flex; align-items:center; justify-content:space-between; padding:6px 0 26px; }
  .brand a{ color:var(--ink); text-decoration:none; font-weight:700; letter-spacing:.04em; }
  .brand a::before{ content:'●'; color:var(--violet); font-size:9px; vertical-align:2px; margin-right:8px; }
  .badge{ font-family:"Space Mono",monospace; font-size:10px; letter-spacing:.22em; color:var(--cyan);
    border:1px solid rgba(125,216,240,.35); border-radius:99px; padding:6px 12px; }
  .eyebrow{ font-family:"Space Mono",monospace; font-size:11px; letter-spacing:.3em; color:var(--cyan);
    text-align:center; margin:8px 0 14px; }
  h1{ font-weight:700; font-size:27px; line-height:1.45; text-align:center; margin:0 0 8px; }
  h1 em{ font-style:normal; background:linear-gradient(90deg,var(--pink),var(--violet)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .date{ text-align:center; font-family:"Space Mono",monospace; font-size:11px; letter-spacing:.22em; color:var(--mute); margin-bottom:24px; }
  .panel{ background:var(--panel); border:1px solid var(--line); border-radius:20px; padding:22px; margin:0 0 18px; }
  .panel-label{ font-family:"Space Mono",monospace; font-size:10px; letter-spacing:.24em; color:var(--violet);
    text-transform:uppercase; margin-bottom:14px; text-align:center; }
  .me{ text-align:center; }
  .me img{ width:120px; height:120px; border-radius:50%; object-fit:cover; border:2px solid rgba(155,124,248,.5); background:#171233; }
  .me .nm{ margin-top:10px; font-size:14px; font-weight:700; }
  .mode-name{ text-align:center; font-size:25px; font-weight:700; letter-spacing:.08em; margin:14px 0 6px; }
  .mode-sub{ text-align:center; color:var(--mute); font-size:13px; line-height:1.9; }
  .tension{ margin-top:20px; }
  .tension .head{ display:flex; justify-content:space-between; font-size:12px; color:var(--mute); margin-bottom:7px; }
  .tension .head b{ color:var(--cyan); font-family:"Space Mono",monospace; }
  .bar{ height:8px; border-radius:5px; background:rgba(255,255,255,.08); overflow:hidden; }
  .bar i{ display:block; height:100%; border-radius:5px; background:linear-gradient(90deg,var(--pink),var(--violet),var(--cyan)); }
  .advice{ font-size:14px; line-height:2.05; color:#d9d5f2; }
  .lucky{ display:flex; align-items:center; gap:16px; }
  .lucky img{ width:76px; height:76px; border-radius:50%; object-fit:cover; border:2px solid rgba(244,114,182,.45); background:#171233; flex:0 0 auto; }
  .lucky .t{ font-size:12px; color:var(--mute); line-height:1.9; }
  .lucky .t b{ display:block; color:var(--ink); font-size:14.5px; margin-bottom:2px; }
  .lucky .t a{ color:var(--violet); }
  .btn{ display:flex; align-items:center; justify-content:center; gap:8px; width:100%; border:none; cursor:pointer;
    border-radius:99px; padding:16px 20px; font-family:inherit; font-size:15px; font-weight:700; letter-spacing:.03em;
    background:linear-gradient(135deg,var(--pink),var(--violet)); color:#0b0820; margin-top:14px;
    transition:transform .15s, box-shadow .15s; text-decoration:none; }
  .btn:hover{ transform:translateY(-1px); box-shadow:0 10px 34px rgba(155,124,248,.35); }
  .btn.ghost{ background:rgba(255,255,255,.05); color:var(--ink); border:1px solid var(--line); font-weight:500; }
  .note{ text-align:center; color:var(--mute); font-size:12px; line-height:1.9; margin-top:10px; }
  .grid16{ display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:8px; }
  .grid16 .cell{ background:rgba(255,255,255,.03); border:1px solid var(--line); border-radius:12px; padding:8px 4px;
    text-align:center; cursor:pointer; transition:.15s; }
  .grid16 .cell img{ width:52px; height:52px; border-radius:50%; object-fit:cover; }
  .grid16 .cell .n{ font-size:9px; color:var(--mute); margin-top:5px; line-height:1.4; }
  .grid16 .cell.sel{ border-color:var(--pink); background:rgba(244,114,182,.12); }
  .seo-txt{ color:var(--mute); font-size:12.5px; line-height:2; margin-top:34px; }
  .seo-txt b{ color:#cfc8f5; }
  .foot{ text-align:center; color:#6d6890; font-size:11px; margin-top:44px; line-height:1.8; }
  .foot a{ color:var(--mute); }

<body>
<div class="wrap">
  <div class="brand">
    <a href="index.html">夜キャラ診断</a>
    <span class="badge">TONIGHT</span>
  </div>

  <div class="eyebrow">DAILY NIGHT MODE</div>
  <h1>今夜の、<em>あなた</em>。</h1>
  <div class="date" id="dateLine">—</div>

  <div id="app"></div>

  <div class="seo-txt">
    <b>「今夜の夜キャラ」</b>は、夜キャラ診断（ナイトタイプ診断）の16タイプ別に“今夜のモード”を占う無料の日替わりコンテンツです。
    今夜のテンション・夜のひとこと・今夜相性がいいナイトタイプが毎晩0時に切り替わります。
    自分のタイプがまだ分からない人は<a href="quiz.html" style="color:var(--violet)">20問・約2〜3分の無料診断</a>から。
    タイプの一覧は<a href="characters.html" style="color:var(--violet)">16タイプ一覧</a>、ふたりの相性は<a href="match.html" style="color:var(--violet)">夜の相性診断</a>で。
  </div>

  <div class="foot">
    夜キャラ診断 — 今夜の夜キャラ（毎晩更新）<br/>
    <a href="index.html">トップへ</a> ・ <a href="quiz.html">診断する</a> ・ <a href="characters.html">16タイプ一覧</a>
  </div>
</div>

<script src="types.js"></script>
<script>
(function(){
  'use strict';
  var ORDER = ['A1','A2','A3','A4','B1','B2','B3','B4','C1','C2','C3','C4','D1','D2','D3','D4'];
  var app = document.getElementById('app');

  /* ── 日替わりコンテンツバンク（文言はここを編集）── */
  var MODES = [
    { n:'没入モード',     s:'今夜は深く潜る日。ひとつのことに、ひとりの相手に、とことん。' },
    { n:'省エネモード',   s:'無理に燃えない。灯りを落として、半分だけ心を開く夜。' },
    { n:'主導権モード',   s:'今夜のハンドルはあなたが握る。遠慮はしまっておく。' },
    { n:'委ねモード',     s:'決めるのは今夜は相手でいい。流される勇気が吉。' },
    { n:'甘やかしモード', s:'尽くしたい欲が高まる夜。与えすぎ注意、でも今夜は許す。' },
    { n:'回収モード',     s:'今夜は受け取る側。日頃のGiveの回収日。' },
    { n:'素直モード',     s:'言葉が湿度を持つ夜。「察して」を今夜だけ休みにする。' },
    { n:'小悪魔モード',   s:'焦らすほど形勢が良くなる夜。余白で勝負。' },
    { n:'充電モード',     s:'誰にも会わない選択も戦略。自分との相性を上げる夜。' },
    { n:'本能モード',     s:'考えるな、感じろの日。理屈は明日の自分に任せる。' },
    { n:'観察モード',     s:'今夜は目がいい。相手の小さな変化に気づけるボーナスタイム。' },
    { n:'共犯モード',     s:'秘密がひとつ増えるといい夜。ふたりだけの温度を作る。' }
  ];
  var ADVICE = [
    '最初の5分を丁寧にすると、今夜は全部うまくいく。',
    '既読の速さより、返す言葉の温度を優先して。',
    '今夜の「もう一杯」は、たぶん正解。',
    '先に灯りを整えて。ムードはあなたの味方になる。',
    '相手の「大丈夫」を一度だけ疑ってみる夜。',
    '今夜は跡を残さない優しさを。明日の関係が軽くなる。',
    '欲しいものは、今夜は言葉にしていい。',
    '沼りそうになったら、一度深呼吸。それでも行くなら本物。',
    '香りをひとつ変えると、夜の記憶に残る側になれる。',
    '今夜の主役は余韻。終わり方を先にイメージして。',
    '駆け引きは3割まで。残りは素直さで押し切る。',
    '寝る前の10分、スマホより相手の声。',
    '今夜は「聞き役」が最強のポジション。',
    '温度差を感じたら、責めずに実況する。それだけで半分解決。',
    '誘い文句は短いほど効く夜。一行で。',
    '今夜のあなたは思ったより魅力的。証拠は明日の通知。'
  ];

  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
  function charImg(code){ var t = types[code]; return t ? (t.image || ('images/'+code+'.png')) : ''; }
  function charName(code){ var t = types[code]; return t ? t.name : '？'; }
  function jstDate(){
    var now = new Date();
    var jst = new Date(now.getTime() + (now.getTimezoneOffset() + 9*60) * 60000);
    var y = jst.getFullYear(), m = ('0'+(jst.getMonth()+1)).slice(-2), d = ('0'+jst.getDate()).slice(-2);
    return y + '-' + m + '-' + d;
  }
  function hash(str){
    var h = 5381;
    for (var i = 0; i < str.length; i++){ h = ((h << 5) + h + str.charCodeAt(i)) >>> 0; }
    return h;
  }

  function render(code){
    var t = types[code];
    var dateStr = jstDate();
    var seed = hash(code + '|' + dateStr);
    var mode   = MODES[seed % MODES.length];
    var advice = ADVICE[(seed >>> 3) % ADVICE.length];
    var tension = 62 + (seed >>> 6) % 37;   // 62〜98%

    // 今夜の相性: 偶数日は good[] から、奇数日は「刺激枠」(good/自分以外)
    var goods = (t.good || []).filter(function(c){ return types[c]; });
    var lucky, luckyLabel;
    var day = parseInt(dateStr.slice(-2), 10);
    if (day % 2 === 0 && goods.length){
      lucky = goods[(seed >>> 9) % goods.length];
      luckyLabel = '今夜の追い風';
    } else {
      var pool = ORDER.filter(function(c){ return c !== code && goods.indexOf(c) < 0; });
      lucky = pool[(seed >>> 9) % pool.length];
      luckyLabel = '今夜の刺激枠';
    }

    document.getElementById('dateLine').textContent = dateStr.replace(/-/g, '.') + ' — TONIGHT ONLY';
    track('today_viewed', { character_type: code });

    var shareText = '【今夜の夜キャラ】' + t.name + 'の今夜は「' + mode.n + '」(テンション' + tension + '%)。あなたの今夜は？ https://yoruchara16types.com/today.html';

    app.innerHTML =
      '<div class="panel me">' +
        '<img src="' + charImg(code) + '" alt="' + esc(t.name) + '" width="120" height="120"/>' +
        '<div class="nm">' + esc(t.name) + '</div>' +
        '<div class="mode-name">「' + esc(mode.n) + '」</div>' +
        '<div class="mode-sub">' + esc(mode.s) + '</div>' +
        '<div class="tension"><div class="head"><span>今夜のテンション</span><b>' + tension + '%</b></div>' +
        '<div class="bar"><i style="width:' + tension + '%"></i></div></div>' +
      '</div>' +
      '<div class="panel"><div class="panel-label">— 夜のひとこと —</div>' +
        '<div class="advice">' + esc(advice) + '</div>' +
      '</div>' +
      '<div class="panel"><div class="panel-label">— ' + esc(luckyLabel) + ' —</div>' +
        '<div class="lucky"><img src="' + charImg(lucky) + '" alt="' + esc(charName(lucky)) + '"/>' +
        '<div class="t"><b>' + esc(charName(lucky)) + '</b>' +
        '今夜このタイプと絡むと何かが起きる。<a href="type/' + lucky + '.html">どんなタイプ？→</a> ・ <a href="match.html?a=' + code + '&b=' + lucky + '">相性を見る→</a></div></div>' +
      '</div>' +
      '<div class="panel"><div class="panel-label">— SHARE —</div>' +
        '<a class="btn ghost" target="_blank" rel="noopener" onclick="track(\'today_share_clicked\',{share_method:\'x\',character_type:\'' + code + '\'})" href="https://twitter.com/intent/tweet?text=' + encodeURIComponent(shareText) + '">Xで今夜のモードをシェア</a>' +
        '<a class="btn ghost" target="_blank" rel="noopener" onclick="track(\'today_share_clicked\',{share_method:\'line\',character_type:\'' + code + '\'})" href="https://line.me/R/share?text=' + encodeURIComponent(shareText) + '">LINEで送る</a>' +
        '<div class="note">このページは毎晩0時に更新。ブックマークかホーム画面に追加して、寝る前の1タップに。</div>' +
      '</div>' +
      '<a class="btn ghost" href="type/' + code + '.html">自分のタイプ詳細を見る</a>' +
      '<div class="note" style="margin-top:4px"><a href="#" id="switchType" style="color:var(--mute)">タイプを選び直す</a></div>';

    document.getElementById('switchType').addEventListener('click', function(e){ e.preventDefault(); renderPicker(code); });
  }

  function renderPicker(sel){
    app.innerHTML =
      '<div class="panel">' +
        '<div class="panel-label">— YOUR NIGHT TYPE —</div>' +
        '<div class="note" style="margin:0 0 6px">あなたの夜キャラを選ぶと、今夜のモードが出ます。</div>' +
        '<div class="grid16">' + ORDER.map(function(c){
          return '<div class="cell' + (sel===c?' sel':'') + '" data-code="' + c + '"><img src="' + charImg(c) + '" loading="lazy" alt="' + esc(charName(c)) + '"/><div class="n">' + esc(charName(c)) + '</div></div>';
        }).join('') + '</div>' +
        '<div class="note" style="margin-top:14px">まだ診断していない？ → <a href="quiz.html" style="color:var(--violet)">20問の無料診断（2〜3分）</a></div>' +
      '</div>';
    app.querySelectorAll('.grid16 .cell').forEach(function(cell){
      cell.addEventListener('click', function(){
        try{ localStorage.setItem('nightTypeResult', cell.dataset.code); }catch(_){}
        render(cell.dataset.code);
        window.scrollTo({top:0});
      });
    });
  }

  var my = '';
  try{ my = localStorage.getItem('nightTypeResult') || ''; }catch(_){}
  if (my && types[my]) render(my);
  else renderPicker('');
})();
</script>
</body>
</html>
