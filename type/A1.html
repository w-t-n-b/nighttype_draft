<style>

  /* ── Cinematic hero ── */
  .type-hero{
    position:relative; min-height:80vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:120px 24px 60px;
    overflow:hidden;
    z-index:5;
  }
  .hero-blur-img{
    position:absolute; inset:-50px;
    z-index:-1; opacity:.35;
    background-size:cover; background-position:center;
    filter:blur(80px) saturate(1.2);
    pointer-events:none;
  }
  .hero-blur-img::after{
    content:""; position:absolute; inset:0;
    background:radial-gradient(ellipse at center, transparent 0%, var(--bg) 75%);
  }

  .type-hero-inner{
    position:relative; z-index:2;
    text-align:center;
    max-width:680px;
  }

  .breadcrumb{
    display:inline-flex; align-items:center; gap:10px;
    font-family:"Space Mono",monospace; font-size:10px;
    letter-spacing:.3em; text-transform:uppercase;
    color:var(--ink-mute); margin-bottom:36px;
  }
  .breadcrumb a{ color:inherit; transition:color .25s; }
  .breadcrumb a:hover{ color:var(--violet); }
  .breadcrumb span{ color:var(--ink-faint); }

  .hero-orbit{
    position:relative;
    width:280px; height:280px;
    margin:0 auto 32px;
    display:flex; align-items:center; justify-content:center;
  }
  .hero-orbit-ring{
    position:absolute; border-radius:50%;
    border:1px solid rgba(155,124,248,.18);
    animation:slowRotate 50s linear infinite;
  }
  .hero-orbit-ring:nth-child(1){
    inset:0;
  }
  .hero-orbit-ring:nth-child(2){
    inset:24px;
    border-color:rgba(34,211,238,.12);
    animation-direction:reverse; animation-duration:65s;
  }
  .hero-orbit-ring:nth-child(3){
    inset:50px;
    border-color:rgba(244,114,182,.1);
    animation-duration:40s;
  }
  .hero-orbit-ring::after{
    content:""; position:absolute; top:-3px; left:50%;
    transform:translateX(-50%);
    width:6px; height:6px; border-radius:50%;
    background:var(--violet);
    box-shadow:0 0 14px var(--violet);
  }
  .hero-orbit-ring:nth-child(2)::after{
    background:var(--cyan); box-shadow:0 0 14px var(--cyan);
  }
  .hero-orbit-ring:nth-child(3)::after{
    background:var(--pink); box-shadow:0 0 14px var(--pink);
  }
  @keyframes slowRotate{ to{transform:rotate(360deg)} }

  .hero-char-frame{
    position:relative;
    width:220px; height:220px; border-radius:50%;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.12);
    box-shadow:
      0 0 80px rgba(155,124,248,.5),
      0 0 160px rgba(34,211,238,.2),
      inset 0 0 50px rgba(0,0,0,.4);
    animation:ntPop .9s cubic-bezier(.34,1.56,.64,1) .2s both;
  }
  .hero-char-frame img{
    width:100%; height:100%; object-fit:cover; display:block;
  }
  .hero-char-frame::before{
    content:""; position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(ellipse at 30% 30%, transparent 30%, rgba(155,124,248,.12) 90%);
  }

  .hero-code{
    font-family:"Space Mono",monospace; font-size:11px;
    letter-spacing:.4em; color:var(--violet);
    margin-bottom:14px;
    animation:ntFadeUp .6s ease .4s both;
  }
  .hero-name{
    font-family:"Cormorant Garamond",serif;
    font-size:clamp(44px, 7vw, 72px);
    font-weight:500; line-height:1.1;
    background:linear-gradient(135deg,#fff,var(--violet) 50%,var(--cyan));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    margin-bottom:18px; letter-spacing:-.01em;
    text-wrap:balance;
    animation:ntFadeUp .7s cubic-bezier(.4,0,.2,1) .5s both;
  }
  .hero-tagline{
    font-family:"Cormorant Garamond",serif; font-style:italic;
    font-size:clamp(18px,3vw,24px);
    color:var(--ink-mute);
    margin-bottom:24px; text-wrap:pretty;
    animation:ntFadeUp .7s ease .6s both;
  }
  .hero-axes{
    display:inline-flex; flex-wrap:wrap; align-items:center; gap:12px;
    padding:10px 22px; border-radius:99px;
    border:1px solid var(--line);
    background:rgba(255,255,255,.02);
    backdrop-filter:blur(8px);
    font-family:"Space Mono",monospace; font-size:11px;
    letter-spacing:.18em; color:var(--ink-mute);
    animation:ntFadeUp .6s ease .7s both;
  }
  .hero-axes strong{ color:var(--ink); font-weight:700; }
  .hero-axes-divider{ color:var(--ink-faint); }

  /* ── Content sections ── */
  .type-content{
    max-width:760px; margin:0 auto;
    padding:0 24px 100px;
    position:relative; z-index:5;
  }

  .ts-block{
    margin-bottom:50px;
  }
  .ts-eyebrow{
    font-family:"Space Mono",monospace; font-size:10px;
    letter-spacing:.4em; text-transform:uppercase;
    color:var(--cyan); margin-bottom:14px;
    display:flex; align-items:center; gap:12px;
  }
  .ts-eyebrow::before{
    content:""; width:24px; height:1px; background:var(--cyan); opacity:.5;
  }
  .ts-title{
    font-family:"Cormorant Garamond",serif;
    font-size:30px; font-weight:500;
    margin-bottom:24px; line-height:1.3;padding-bottom:.1em;
    text-wrap:balance;
  }
  .ts-title em{
    font-style:italic;
    color:var(--violet);
    padding-bottom:.15em;
    display:inline-block;
    line-height:1.25;
  }

  .ts-card{
    padding:36px 32px;
    border-radius:24px;
    border:1px solid var(--line);
    background:var(--glass);
    backdrop-filter:blur(20px) saturate(140%);
    position:relative;
  }
  .ts-card::before{
    content:""; position:absolute; top:0; left:24px; right:24px; height:1px;
    background:linear-gradient(90deg,transparent,rgba(155,124,248,.6),rgba(34,211,238,.4),transparent);
  }

  .ts-quote{
    font-family:"Cormorant Garamond",serif; font-style:italic;
    font-size:24px; line-height:1.5; color:var(--ink);
    padding-left:24px; border-left:2px solid var(--violet);
    margin-bottom:28px; text-wrap:pretty;
  }
  .ts-text{
    font-size:15px; line-height:1.95; color:var(--ink-mute);
    text-wrap:pretty;
  }
  .ts-text p{ margin-bottom:16px; }
  .ts-text p:last-child{ margin-bottom:0; }

  .ts-meta{
    display:flex; gap:10px; flex-wrap:wrap;
    margin-top:28px; padding-top:24px;
    border-top:1px solid var(--line);
  }
  .ts-meta-chip{
    font-family:"Space Mono",monospace; font-size:10px;
    letter-spacing:.18em; text-transform:uppercase;
    padding:6px 12px; border-radius:99px;
    background:rgba(255,255,255,.03);
    border:1px solid var(--line);
    color:var(--ink-mute);
  }
  .ts-meta-chip strong{ color:var(--violet); margin-right:6px; font-weight:700; }

  /* Aruaru list */
  .aruaru-list{
    display:flex; flex-direction:column; gap:10px;
  }
  .aruaru-item{
    display:flex; gap:14px;
    padding:18px 22px;
    border-radius:14px;
    background:rgba(255,255,255,.02);
    border:1px solid var(--line);
    font-size:14.5px; line-height:1.7; color:var(--ink-mute);
    transition:all .25s;
    text-wrap:pretty;
  }
  .aruaru-item:hover{
    border-color:rgba(155,124,248,.3);
    background:rgba(155,124,248,.04);
    transform:translateX(2px);
  }
  .aruaru-num{
    flex-shrink:0;
    font-family:"Space Mono",monospace; font-size:11px;
    color:var(--violet); padding-top:2px;
    letter-spacing:.1em;
  }

  /* Compatibility split */
  .compat-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:18px;
  }
  .compat-card{
    padding:28px;
    border-radius:20px;
    border:1px solid var(--line);
    background:var(--glass);
    backdrop-filter:blur(16px);
    position:relative; overflow:hidden;
  }
  .compat-card.good::before{
    content:""; position:absolute; top:0; left:0; right:0; height:1px;
    background:linear-gradient(90deg, transparent, rgba(244,114,182,.7), transparent);
  }
  .compat-card.bad::before{
    content:""; position:absolute; top:0; left:0; right:0; height:1px;
    background:linear-gradient(90deg, transparent, rgba(99,102,241,.7), transparent);
  }
  .compat-head{
    font-family:"Space Mono",monospace; font-size:10px;
    letter-spacing:.3em; text-transform:uppercase;
    margin-bottom:16px;
    display:flex; align-items:center; gap:8px;
  }
  .compat-card.good .compat-head{ color:var(--pink); }
  .compat-card.bad  .compat-head{ color:#a5b4fc; }
  .compat-head .dot{
    width:6px; height:6px; border-radius:50%;
    background:currentColor;
    box-shadow:0 0 10px currentColor;
  }
  .compat-list{
    display:flex; flex-direction:column; gap:10px;
    margin-bottom:18px;
  }
  .compat-item{
    display:flex; align-items:center; gap:12px;
    padding:10px;
    border-radius:14px;
    border:1px solid var(--line);
    background:rgba(255,255,255,.02);
    cursor:pointer;
    transition:all .25s;
    text-decoration:none; color:inherit;
  }
  .compat-item:hover{
    border-color:rgba(155,124,248,.4);
    background:rgba(155,124,248,.06);
    transform:translateX(2px);
  }
  .compat-item img{
    width:44px; height:44px; border-radius:50%;
    object-fit:cover; flex-shrink:0;
    border:1px solid var(--line);
  }
  .compat-item-body{ flex:1; min-width:0; }
  .compat-item-code{
    font-family:"Space Mono",monospace; font-size:9px;
    letter-spacing:.18em; color:var(--violet); margin-bottom:2px;
  }
  .compat-item-name{
    font-family:"Cormorant Garamond",serif; font-size:16px;
    font-weight:500; color:var(--ink);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .compat-reason{
    font-size:13.5px; line-height:1.85; color:var(--ink-mute);
    text-wrap:pretty;
    padding:16px 18px;
    border-radius:12px;
    background:rgba(255,255,255,.02);
    border-left:2px solid;
  }
  .compat-card.good .compat-reason{ border-left-color:var(--pink); }
  .compat-card.bad  .compat-reason{ border-left-color:#a5b4fc; }

  /* Bottom CTA */
  .ts-cta{
    display:flex; gap:14px; flex-wrap:wrap; justify-content:center;
    margin-top:60px;
  }

  @media (max-width:600px){
    .type-hero{padding:100px 18px 50px; min-height:70vh}
    .hero-orbit{width:240px; height:240px}
    .hero-char-frame{width:190px; height:190px}
    .type-content{padding:0 18px 80px}
    .ts-card{padding:26px 22px}
    .ts-quote{font-size:20px}
    .ts-title{font-size:24px}
    .compat-grid{grid-template-columns:1fr; gap:14px}
  }

  /* Mirror compare (05) */
  .mirror-card{ padding:24px; }
  .mirror-grid{
    display:grid;
    grid-template-columns:repeat(8,1fr); gap:8px;
    margin-bottom:22px;
  }
  @media(max-width:640px){
    .mirror-grid{ grid-template-columns:repeat(4,1fr); }
  }
  .mr-cell{
    position:relative; aspect-ratio:1;
    border-radius:12px; overflow:hidden;
    cursor:pointer;
    border:1px solid var(--line);
    background:radial-gradient(ellipse at 50% 70%, rgba(124,58,237,.22) 0%, #0a0a1a 70%);
    transition:transform .2s, border-color .2s, box-shadow .2s;
  }
  .mr-cell:hover{ transform:translateY(-2px); border-color:rgba(155,124,248,.5); }
  .mr-cell.active{
    border-color:var(--violet);
    box-shadow:0 0 0 1px var(--violet),0 0 24px rgba(155,124,248,.5);
  }
  .mr-cell img{ width:100%; height:100%; object-fit:contain; padding:6px; }
  .mr-cell-code{
    position:absolute; bottom:0; left:0; right:0;
    padding:4px;
    background:linear-gradient(transparent, rgba(0,0,0,.85));
    font-family:'Space Mono',monospace; font-size:9px; letter-spacing:.2em;
    text-align:center; color:#fff;
  }
  .mirror-result{ display:none; border-top:1px solid var(--line); padding-top:22px; }
  .mirror-result.show{ display:block; }
  .mr-pair{
    display:flex; align-items:center; justify-content:center;
    gap:22px; margin-bottom:18px;
  }
  .mr-char{ display:flex; flex-direction:column; align-items:center; gap:8px; }
  .mr-char img{
    width:72px; height:72px; border-radius:16px; object-fit:contain;
    background:radial-gradient(ellipse at 50% 65%, rgba(124,58,237,.18) 0%, rgba(0,0,0,.4) 70%);
    border:1px solid var(--line);
  }
  .mr-name{ font-family:"Cormorant Garamond",serif; font-size:14px; }
  .mr-cross{
    font-family:"Cormorant Garamond",serif; font-style:italic;
    font-size:32px;
    background:linear-gradient(135deg,var(--violet),var(--pink));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .mr-score{ text-align:center; margin-bottom:14px; }
  .mr-hearts{
    font-size:24px; letter-spacing:4px;
    background:linear-gradient(135deg,var(--violet),var(--pink),var(--cyan));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    margin-bottom:6px;
  }
  .mr-label{
    font-family:"Noto Sans JP",sans-serif; font-size:14px; font-weight:700;
    background:linear-gradient(135deg,var(--violet),var(--pink));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .mr-comment{
    font-size:13.5px; line-height:1.85; color:var(--ink-mute);
    padding:16px 18px; border-radius:12px;
    background:rgba(155,124,248,.06);
    border-left:2px solid var(--violet);
    text-wrap:pretty;
  }

</style>

<script>
  // ── Get type code ──
  const params = new URLSearchParams(location.search);
  const code = 'A1';
  const t = types[code] || types.A1;

  // ── Page meta ──
  document.title = `${t.name} — 夜キャラ診断`;
  document.getElementById('pageTitle').textContent = `${t.name} — 夜キャラ診断`;
  document.getElementById('ogTitle').setAttribute('content', `${t.name}｜夜キャラ診断`);
  document.getElementById('ogDesc').setAttribute('content', t.tagline || '');
  if(t.image) document.getElementById('ogImage').setAttribute('content', t.image);

  // ── Hero ──
  const imgSrc = t.image || `../images/${code}.png`;
  const charImg = document.getElementById('charImg');
  charImg.src = imgSrc.startsWith("images/")?"../"+imgSrc:imgSrc; charImg.alt = t.name;
  document.getElementById('heroBg').style.backgroundImage = `url("${imgSrc.startsWith("images/")?"../"+imgSrc:imgSrc}")`;

  const _bc = document.getElementById('bcCode'); if(_bc) _bc.textContent = t.name;
  document.getElementById('heroCode').textContent = `${t.axisCode || ''}`;
  document.getElementById('heroName').textContent = t.name;
  document.getElementById('heroTagline').textContent = `"${t.tagline || ''}"`;

  const axesParts = (t.axes || '').split('×').map(s=>s.trim());
  if(axesParts.length===4){
    document.getElementById('axNuma').textContent = axesParts[0];
    document.getElementById('axSm').textContent   = axesParts[1];
    document.getElementById('axAi').textContent   = axesParts[2];
    document.getElementById('axGt').textContent   = axesParts[3];
  }

  // ── Description ──  function paragraphify(text){
    return (text || '')
      .split(/\n\s*\n/)
      .map(p => `<p>${p.replace(/\n/g,'<br/>')}</p>`)
      .join('');
  }
  document.getElementById('typeDesc').innerHTML = paragraphify(t.description);

  // ── Detail ──

  // Meta row
  const meta = [];
  (t.keyword || []).forEach(k=> meta.push(`<span class="ts-meta-chip">${k}</span>`));
  document.getElementById('metaRow').innerHTML = meta.join('');

  // ── Aruaru ──
  const aruList = (typeof aruaruData !== 'undefined' && aruaruData[code]) || [];
  document.getElementById('aruaruList').innerHTML =
    aruList.map((a,i)=>`
      <div class="aruaru-item">
        <div class="aruaru-num">${String(i+1).padStart(2,'0')}</div>
        <div>${a}</div>
      </div>
    `).join('');

  // ── Compatibility ──
  function compatItem(c){
    const tt = types[c];
    if(!tt) return '';
    return `
      <a class="compat-item" href="${c}.html">
        <img src="${(tt.image||"").startsWith("images/")?"../"+tt.image:(tt.image||`../images/${c}.png`)}" alt=""
             onerror="this.style.display='none'"/>
        <div class="compat-item-body">
          <div class="compat-item-code">${(types[c]||{}).name||""}</div>
          <div class="compat-item-name">${tt.name}</div>
        </div>
      </a>
    `;
  }
  document.getElementById('goodList').innerHTML = (t.good || []).map(compatItem).join('');
  document.getElementById('badList').innerHTML  = (t.bad  || []).map(compatItem).join('');
  document.getElementById('goodReason').textContent = t.goodReason || '';
  document.getElementById('badReason').textContent  = t.badReason  || '';

  // ── 05 · Mirror compare ──
  (function setupMirror(){
    const order = ['A1','A2','A3','A4','B1','B2','B3','B4','C1','C2','C3','C4','D1','D2','D3','D4'];
    const grid = document.getElementById('mirrorGrid');
    if(!grid) return;
    grid.innerHTML = order.filter(c=>c!==code).map(c=>{
      const tt = types[c]; if(!tt) return '';
      const imgSrc = (tt.image||'').startsWith('images/') ? '../'+tt.image : (tt.image || '../images/'+c+'.png');
      return `<div class="mr-cell" data-code="${c}"><img src="${imgSrc}" alt="${tt.name}" onerror="this.style.display='none'"><div class="mr-cell-code">${(types[c]||{}).name||""}</div></div>`;
    }).join('');
    function axisCompare(myCode, other){
      const TIER_COPY = {
        5: {label:'夜の双子',summary:'初対面で朝5時まで気まずさゼロ',txt:'笑うタイミング、酔うタイミング、帰りたくなるタイミングまで全部一致。会って3時間でベスフレ確定の相性。'},
        4: {label:'波長一致',summary:'気づいたら終電なくなってるタイプ',txt:'2軒目以降のテンションが揃う。酔い方の方向性が同じで、朝まで語れる。'},
        3: {label:'並ぶ夜',summary:'酒は飲めるけど話は深まらない',txt:'黙って隣で飲める関係。盛り上がりはしないけど、別に嫌でもない。普通の飲み友ポジション。'},
        2: {label:'微妙なすれ違い',summary:'終電の使い方で価値観バトル',txt:'あなたが二件目行きたい時、相手はタクシー呼んでる。夜の終わり方が合わない人。'},
        1: {label:'天敵レベル',summary:'居酒屋の2時間がまるで永遠',txt:'あなたが乾杯したい瞬間、相手はもう帰りたい。テンションのタイミングが完全に真逆。気まずい沈黙のオンパレード。'}
      };
      const me = types[myCode], you = types[other];
      if(!me || !you || !me.axisCode || !you.axisCode) return null;
      const a = me.axisCode.split('-'), b = you.axisCode.split('-');
      const sN = a[0]===b[0], sS = a[1]===b[1], sA = a[2]===b[2], sG = a[3]===b[3];
      let tier;
      if(sN && !sS && sA && !sG) tier = 5;
      else if(!sN && sS && !sA && sG) tier = 1;
      else{
        const cnt = [sN,sS,sA,sG].filter(Boolean).length;
        if(cnt===3) tier = 4;
        else if(cnt===2 || cnt===4) tier = 3;
        else tier = 2;
      }
      const tc = TIER_COPY[tier];
      return {hearts: tier, label: tc.label, txt: tc.txt, summary: tc.summary};
    }
    grid.querySelectorAll('.mr-cell').forEach(el=>{
      el.addEventListener('click', ()=>{
        grid.querySelectorAll('.mr-cell').forEach(e=>e.classList.remove('active'));
        el.classList.add('active');
        const other = el.dataset.code;
        const r = axisCompare(code, other);
        if(!r) return;
        const me = types[code], you = types[other];
        const myImg = (me.image||'').startsWith('images/') ? '../'+me.image : (me.image || '../images/'+code+'.png');
        const youImg = (you.image||'').startsWith('images/') ? '../'+you.image : (you.image || '../images/'+other+'.png');
        document.getElementById('mr1Img').src = myImg;
        document.getElementById('mr2Img').src = youImg;
        document.getElementById('mr1Name').textContent = me.name;
        document.getElementById('mr2Name').textContent = you.name;
        document.getElementById('mrHearts').textContent = '★'.repeat(r.hearts) + '☆'.repeat(5-r.hearts);
        // Show summary
        let sumEl = document.querySelector('.mr-summary');
        if(!sumEl){ sumEl = document.createElement('div'); sumEl.className='mr-summary'; sumEl.style.cssText='font-family:Noto Sans JP,sans-serif;font-size:13px;color:#fff;margin:4px 0 10px;text-wrap:balance;text-align:center'; document.getElementById('mrLabel').parentNode.insertBefore(sumEl, document.getElementById('mrLabel').nextSibling); }
        sumEl.textContent = '「' + (r.summary || '') + '」';
        document.getElementById('mrLabel').textContent = r.label;
        document.getElementById('mrComment').textContent = r.txt;
        document.getElementById('mirrorResult').classList.add('show');
      });
    });
  })();

</script>
